name: Docker Build Backend Image

on:
  workflow_call:
    outputs:
      image_digest:
        description: 게시된 backend 이미지 매니페스트의 불변 digest
        value: ${{ jobs.publish_backend_manifest.outputs.image_digest }}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_REPOSITORY: yeon-backend

# 현재 운영 배포 타깃은 라즈베리파이(ARM64) 하나이고 amd64 이미지는 소비처가 없으므로
# 일회성 GitHub-hosted ARM64 러너에서 arm64 단일 아키텍처 이미지만 빌드한다.
# N100(amd64) 이전 시 docs/deployment/n100-proxmox-cutover.md에 따라 amd64 빌드를 복원한다.
jobs:
  build_backend_arm64:
    runs-on: ubuntu-24.04-arm
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-backend-arm64-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.BACKEND_IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: GHCR 로그인
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: 디스크·이미지 정리 (빌드 전)
        run: |
          docker image prune -f --filter "until=48h"

      - name: 빌드 전 러너 상태 출력
        run: |
          set +e
          echo "디스크 사용량:"
          df -h / "$HOME" 2>/dev/null || df -h
          echo "메모리 사용량:"
          free -h || true
          echo "Docker 사용량:"
          docker system df || true
          echo "Buildx builder:"
          docker buildx ls || true

      - name: Build backend arm64 image by digest
        id: build
        env:
          BUILDX_CONTEXT: .
          BUILDX_FILE: ./apps/backend/Dockerfile
          BUILDX_PLATFORMS: linux/arm64
          BUILDX_IMAGE: ${{ steps.image.outputs.ref }}
          BUILDX_METADATA_FILE: ${{ runner.temp }}/backend-build-metadata.json
          BUILDX_LABELS: ${{ steps.meta.outputs.labels }}
          BUILDX_CACHE_FROM: |
            type=registry,ref=${{ steps.image.outputs.ref }}:buildcache-arm64
          BUILDX_CACHE_TO: |
            type=registry,ref=${{ steps.image.outputs.ref }}:buildcache-arm64,mode=min
        run: bash scripts/ci/buildx-build-with-retry.sh

      - name: Export arm64 digest
        run: |
          rm -rf "${DIGEST_DIR}"
          mkdir -p "${DIGEST_DIR}"
          digest="${{ steps.build.outputs.digest }}"
          touch "${DIGEST_DIR}/${digest#sha256:}"

      - name: Upload arm64 digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-backend-arm64
          path: ${{ env.DIGEST_DIR }}/*
          if-no-files-found: error
          retention-days: 1

      - name: 실패 시 러너 상태 출력
        if: failure() || cancelled()
        run: |
          set +e
          echo "실패 시 디스크 사용량:"
          df -h / "$HOME" 2>/dev/null || df -h
          echo "실패 시 메모리 사용량:"
          free -h || true
          echo "실패 시 Docker 사용량:"
          docker system df || true
          echo "실패 시 Buildx builder:"
          docker buildx ls || true

  publish_backend_manifest:
    needs:
      - build_backend_arm64
    # GitHub-hosted 러너에서 arm64 매니페스트를 게시하고 최종 digest를 확정한다.
    runs-on: ubuntu-latest
    outputs:
      image_digest: ${{ steps.published.outputs.image_digest }}
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-backend-manifest-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.BACKEND_IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: GHCR 로그인
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: Download image digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ env.DIGEST_DIR }}
          pattern: digest-backend-*
          merge-multiple: true

      - name: Create and push multi-arch manifest
        working-directory: ${{ env.DIGEST_DIR }}
        env:
          # metadata-action의 개행 구분 tags 출력을 직접 사용한다.
          METADATA_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          all_entries=(*)
          digest_files=()
          for entry in "${all_entries[@]}"; do
            [ -f "$entry" ] || continue
            if [[ "$entry" =~ ^[0-9a-f]{64}$ ]]; then
              digest_files+=("$entry")
            fi
          done

          if [ "${#digest_files[@]}" -ne 1 ]; then
            echo "backend digest 파일 개수가 예상과 다릅니다: ${#digest_files[@]}개"
            exit 1
          fi

          refs=()
          for digest in "${digest_files[@]}"; do
            ref="${IMAGE}@sha256:${digest}"
            refs+=("$ref")
            for i in 1 2 3; do
              docker buildx imagetools inspect "$ref" >/dev/null 2>&1 && break
              [ "$i" -eq 3 ] && { echo "backend digest 확인 실패: $ref"; exit 1; }
              echo "backend digest 확인 실패 (${i}/3), 10초 후 재시도..."
              sleep 10
            done
          done

          mapfile -t tags < <(printf '%s\n' "$METADATA_TAGS" | sed '/^[[:space:]]*$/d')
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "backend manifest 태그가 비어 있습니다."
            exit 1
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(-t "$tag")
          done

          for i in 1 2 3; do
            docker buildx imagetools create "${tag_args[@]}" "${refs[@]}" && break
            [ "$i" -eq 3 ] && { echo "backend manifest 생성 실패"; exit 1; }
            wait_seconds=$((i * 20))
            echo "backend manifest 생성 실패 (${i}/3), ${wait_seconds}초 후 재시도..."
            sleep "$wait_seconds"
          done

      - name: Resolve published manifest digest
        id: published
        env:
          IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail
          commit_tag="${IMAGE}:sha-${GITHUB_SHA:0:7}"
          digest=""

          for i in 1 2 3; do
            if digest="$(docker buildx imagetools inspect "$commit_tag" --format '{{ .Manifest.Digest }}' 2>/dev/null)" &&
              [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              break
            fi

            if [ "$i" -eq 3 ]; then
              echo "게시된 backend 매니페스트 digest 확인 실패: $commit_tag"
              exit 1
            fi

            echo "backend 매니페스트 digest 확인 실패 (${i}/3), 20초 후 재시도..."
            sleep 20
          done

          printf 'image_digest=%s\n' "$digest" >> "$GITHUB_OUTPUT"
