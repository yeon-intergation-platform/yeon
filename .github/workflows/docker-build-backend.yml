name: Docker Build Backend Image

on:
  workflow_call:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_REPOSITORY: yeon-backend

# amd64 빌드는 GitHub-hosted ubuntu-latest 전용이라 무료 private repo의 Actions 결제 차단에 막혔다.
# 현재 운영 배포 타깃은 라즈베리파이(ARM64) self-hosted 러너뿐이고 amd64 소비처가 없어 arm64 단일로 빌드한다.
# N100(amd64) 이전 시 docs/deployment/n100-proxmox-cutover.md에 따라 amd64 빌드를 복원한다.
jobs:
  build_backend_arm64:
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-backend-arm64-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.BACKEND_IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          driver: docker-container
          name: yeon-backend-arm64-builder

      - name: GHCR 로그인
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: 디스크·이미지 정리 (빌드 전)
        run: |
          docker image prune -f --filter "until=48h"

      - name: Resolve BUILDX_LOCAL_CACHE
        run: echo "BUILDX_LOCAL_CACHE=$HOME/.cache/buildx-yeon-backend-arm64" >> "$GITHUB_ENV"

      - name: Prepare local buildx cache dir
        run: mkdir -p "${BUILDX_LOCAL_CACHE}"

      - name: Build backend arm64 image by digest
        uses: docker/build-push-action@v7.1.0
        id: build
        with:
          context: .
          file: ./apps/backend/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: |
            type=local,src=${{ env.BUILDX_LOCAL_CACHE }}
            type=registry,ref=${{ steps.image.outputs.ref }}:buildcache-arm64
          cache-to: |
            type=local,dest=${{ env.BUILDX_LOCAL_CACHE }},mode=max
            type=registry,ref=${{ steps.image.outputs.ref }}:buildcache-arm64,mode=min

      - name: Export arm64 digest
        run: |
          rm -rf "${DIGEST_DIR}"
          mkdir -p "${DIGEST_DIR}"
          digest="${{ steps.build.outputs.digest }}"
          touch "${DIGEST_DIR}/${digest#sha256:}"

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digest-backend-arm64
          path: ${{ env.DIGEST_DIR }}/*
          if-no-files-found: error
          retention-days: 1

      - name: Buildx cache prune (backend ARM64 local, 10GB 이하 유지)
        if: always()
        run: docker buildx prune -f --keep-storage 10GB --filter "until=168h" || true

  publish_backend_manifest:
    needs:
      - build_backend_arm64
    # arm64 단일 아키 manifest 태깅도 self-hosted ARM64 러너에서 수행한다(billing 무관).
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-backend-manifest-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.BACKEND_IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: GHCR 로그인
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: Download image digests
        uses: actions/download-artifact@v8.0.1
        with:
          path: ${{ env.DIGEST_DIR }}
          pattern: digest-backend-*
          merge-multiple: true

      - name: Create and push multi-arch manifest
        working-directory: ${{ env.DIGEST_DIR }}
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          all_entries=(*)
          digest_files=()
          for entry in "${all_entries[@]}"; do
            [ -f "$entry" ] || continue
            if [[ "$entry" =~ ^[0-9a-f]{64}$ ]]; then
              digest_files+=("$entry")
            fi
          done

          if [ "${#digest_files[@]}" -ne 1 ]; then
            echo "backend digest 파일 개수가 예상과 다릅니다: ${#digest_files[@]}개"
            exit 1
          fi

          refs=()
          for digest in "${digest_files[@]}"; do
            ref="${IMAGE}@sha256:${digest}"
            refs+=("$ref")
            for i in 1 2 3; do
              docker buildx imagetools inspect "$ref" >/dev/null 2>&1 && break
              [ "$i" -eq 3 ] && { echo "backend digest 확인 실패: $ref"; exit 1; }
              echo "backend digest 확인 실패 (${i}/3), 10초 후 재시도..."
              sleep 10
            done
          done

          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "backend manifest 태그가 비어 있습니다."
            exit 1
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(-t "$tag")
          done

          for i in 1 2 3; do
            docker buildx imagetools create "${tag_args[@]}" "${refs[@]}" && break
            [ "$i" -eq 3 ] && { echo "backend manifest 생성 실패"; exit 1; }
            wait_seconds=$((i * 20))
            echo "backend manifest 생성 실패 (${i}/3), ${wait_seconds}초 후 재시도..."
            sleep "$wait_seconds"
          done
