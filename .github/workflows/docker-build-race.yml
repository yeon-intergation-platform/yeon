name: Docker Build Race Image

on:
  workflow_call:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  RACE_IMAGE_REPOSITORY: yeon-race-server

jobs:
  build_race_amd64:
    runs-on: ubuntu-latest
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-race-amd64-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.RACE_IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: GHCR Ž°úÍ∑łžĚł
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: Build race-server amd64 image by digest
        uses: docker/build-push-action@v7.1.0
        id: build
        with:
          context: .
          file: ./apps/race-server/Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=yeon-race-amd64
          cache-to: type=gha,mode=max,scope=yeon-race-amd64

      - name: Export amd64 digest
        run: |
          rm -rf "${DIGEST_DIR}"
          mkdir -p "${DIGEST_DIR}"
          digest="${{ steps.build.outputs.digest }}"
          touch "${DIGEST_DIR}/${digest#sha256:}"

      - name: Upload amd64 digest
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digest-race-amd64
          path: ${{ env.DIGEST_DIR }}/*
          if-no-files-found: error
          retention-days: 1

  build_race_arm64:
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-race-arm64-${{ github.run_id }}-${{ github.run_attempt }}
      # BUILDX_LOCAL_CACHE ŽäĒ Pi runner žú†ž†ÄžĚė žč§ž†ú $HOME žĚī /home/runner ÍįÄ žēĄŽčź žąė žěąžĖī
      # job-level env žóź ŪēėŽďúžĹĒŽĒ©ŪēėžßÄ žēäÍ≥† "Resolve BUILDX_LOCAL_CACHE" žä§ŪÖĚžóźžĄú $HOME Íłįž§ÄžúľŽ°ú ŪēīžĄĚŪēúŽč§.

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.RACE_IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          # Pi Í≥†ž†ē builder ‚ÄĒ ÍįôžĚÄ BuildKit ŽćįŽ™¨žĚĄ žě¨žā¨žö©Ūēī --mount=type=cache(pnpm-store)ÍįÄ run ÍįĄ Ž≥īž°īŽźúŽč§.
          driver: docker-container
          name: yeon-race-arm64-builder

      - name: GHCR Ž°úÍ∑łžĚł
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: ŽĒĒžä§ŪĀ¨¬∑žĚīŽĮłžßÄ ž†ēŽ¶¨ (ŽĻĆŽďú ž†Ą)
        run: |
          docker image prune -f --filter "until=48h"
          # builder prunežĚÄ pnpm-store ŽďĪ BuildKit žĚłŽĚľžĚł žļźžčúŽŹĄ žßÄžöįŽĮÄŽ°ú pre-buildžóźžĄúŽäĒ ž†úÍĪį.
          # žôłŽ∂Ä local cache exporterŽäĒ post-build rotate Žč®Í≥ĄžóźžĄú žė§ŽěėŽźú blob ŽąĄž†ĀžĚĄ ž†úÍĪįŪēúŽč§.

      - name: Resolve BUILDX_LOCAL_CACHE
        run: |
          echo "BUILDX_LOCAL_CACHE=$HOME/.cache/buildx-yeon-race-arm64" >> "$GITHUB_ENV"
          echo "BUILDX_LOCAL_CACHE_NEW=$HOME/.cache/buildx-yeon-race-arm64-new" >> "$GITHUB_ENV"

      - name: Prepare local buildx cache dir
        run: |
          mkdir -p "${BUILDX_LOCAL_CACHE}"
          rm -rf "${BUILDX_LOCAL_CACHE_NEW}"
          mkdir -p "${BUILDX_LOCAL_CACHE_NEW}"

      - name: Build race-server arm64 image by digest
        uses: docker/build-push-action@v7.1.0
        id: build
        with:
          context: .
          file: ./apps/race-server/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          # provenance / sbom žĚÄ cache export Ž•ľ Ž¨īÍ≤ĀÍ≤Ć ŪēėÍ≥† žó¨ÍłįžĄ† žďįžßÄ žēäžúľŽĮÄŽ°ú off.
          provenance: false
          sbom: false
          cache-from: |
            type=local,src=${{ env.BUILDX_LOCAL_CACHE }}
            type=registry,ref=${{ steps.image.outputs.ref }}:buildcache-arm64
          # local žĚÄ Pi ŽĒĒžä§ŪĀ¨ŽĚľ ŽĻ†Ž•īŽĮÄŽ°ú mode=max Ž°ú Ž™®Žď† layer Ž≥īÍīÄ, registry ŽäĒ cross-runner fallback žö©žĚīŽĚľ min žúľŽ°ú ž∂©Ž∂Ą.
          cache-to: |
            type=local,dest=${{ env.BUILDX_LOCAL_CACHE_NEW }},mode=max
            type=registry,ref=${{ steps.image.outputs.ref }}:buildcache-arm64,mode=min

      - name: Export arm64 digest
        run: |
          rm -rf "${DIGEST_DIR}"
          mkdir -p "${DIGEST_DIR}"
          digest="${{ steps.build.outputs.digest }}"
          touch "${DIGEST_DIR}/${digest#sha256:}"

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digest-race-arm64
          path: ${{ env.DIGEST_DIR }}/*
          if-no-files-found: error
          retention-days: 1

      - name: Rotate arm64 local buildx cache
        run: |
          if [ ! -f "${BUILDX_LOCAL_CACHE_NEW}/index.json" ]; then
            echo "žÉą buildx local cachežóź index.jsonžĚī žóÜžĖī Íłįž°ī žļźžčúŽ•ľ žú†žßÄŪē©ŽčąŽč§." >&2
            exit 1
          fi
          rm -rf "${BUILDX_LOCAL_CACHE}"
          mv "${BUILDX_LOCAL_CACHE_NEW}" "${BUILDX_LOCAL_CACHE}"
          du -sh "${BUILDX_LOCAL_CACHE}" || true

      - name: Cleanup temporary arm64 local buildx cache
        if: always()
        run: rm -rf "${BUILDX_LOCAL_CACHE_NEW}"

      - name: BuildKit internal cache prune (race ARM64, 10GB žĚīŪēė žú†žßÄ)
        if: always()
        run: docker buildx prune -f --keep-storage 10GB --filter "until=168h" || true

  publish_race_manifest:
    needs:
      - build_race_amd64
      - build_race_arm64
    runs-on: ubuntu-latest
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-race-manifest-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.RACE_IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: GHCR Ž°úÍ∑łžĚł
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: Download image digests
        uses: actions/download-artifact@v8.0.1
        with:
          path: ${{ env.DIGEST_DIR }}
          pattern: digest-race-*
          merge-multiple: true

      - name: Create and push multi-arch manifest
        working-directory: ${{ env.DIGEST_DIR }}
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          all_entries=(*)
          digest_files=()
          for entry in "${all_entries[@]}"; do
            [ -f "$entry" ] || continue
            if [[ "$entry" =~ ^[0-9a-f]{64}$ ]]; then
              digest_files+=("$entry")
            fi
          done

          if [ "${#digest_files[@]}" -ne 2 ]; then
            echo "race-server digest ŪĆĆžĚľ ÍįúžąėÍįÄ žėąžÉĀÍ≥ľ Žč§Ž¶ÖŽčąŽč§: ${#digest_files[@]}Íįú"
            exit 1
          fi

          refs=()
          for digest in "${digest_files[@]}"; do
            ref="${IMAGE}@sha256:${digest}"
            refs+=("$ref")
            for i in 1 2 3; do
              docker buildx imagetools inspect "$ref" >/dev/null 2>&1 && break
              [ "$i" -eq 3 ] && { echo "race digest ŪôēžĚł žč§ŪĆ®: $ref"; exit 1; }
              echo "race digest ŪôēžĚł žč§ŪĆ® (${i}/3), 10žīą ŪõĄ žě¨žčúŽŹĄ..."
              sleep 10
            done
          done

          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "race manifest ŪÉúÍ∑łÍįÄ ŽĻĄžĖī žěąžäĶŽčąŽč§."
            exit 1
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(-t "$tag")
          done

          for i in 1 2 3; do
            docker buildx imagetools create "${tag_args[@]}" "${refs[@]}" && break
            [ "$i" -eq 3 ] && { echo "race manifest žÉĚžĄĪ žč§ŪĆ®"; exit 1; }
            wait_seconds=$((i * 20))
            echo "race manifest žÉĚžĄĪ žč§ŪĆ® (${i}/3), ${wait_seconds}žīą ŪõĄ žě¨žčúŽŹĄ..."
            sleep "$wait_seconds"
          done
