name: SSOT Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ssot-check:
    # GitHub-hosted ubuntu-latest는 무료 private repo의 Actions 결제 차단에 막혀 잡 자체가 시작되지 않는다.
    # 운영 self-hosted ARM64 러너로 고정해 billing과 무관하게 검증이 돌게 한다.
    runs-on: [self-hosted, Linux, ARM64]
    name: SSOT + 스킬 wrapper drift 검증
    steps:
      - uses: actions/checkout@v6.0.2

      # self-hosted ARM64 러너에는 시스템 node가 PATH에 없어 verify-parity.mjs가 깨진다.
      # 러너 내장 node/npm에 의존하지 않고 setup-node로 self-contained node를 PATH에 깐다.
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: 프로젝트 SSOT 건전성 검사
        run: bash bin/verify-ssot.sh --project-only

      - name: Backend CI 계약 검증
        run: node bin/verify-backend-ci-contract.mjs

      - name: 스킬 wrapper 동기화 검사
        run: bash bin/sync-skills.sh --check

      - name: Universal UI Parity 검증
        run: node bin/verify-parity.mjs

      - name: 실패 시 복구 안내
        if: failure()
        run: |
          echo "::error::SSOT drift / 스킬 wrapper 불일치 / Universal UI parity 위반. 로컬에서 다음을 실행하세요:"
          echo "  bin/setup.sh    # 최초 1회"
          echo "  bin/sync-skills.sh"
          echo "  bin/verify-ssot.sh"
          echo "  node bin/verify-backend-ci-contract.mjs"
          echo "  node bin/verify-parity.mjs"
