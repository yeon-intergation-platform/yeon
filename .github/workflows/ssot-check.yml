name: SSOT Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ssot-check:
    # 공개 저장소의 PR 코드는 job마다 폐기되는 GitHub-hosted runner에서만 실행한다.
    runs-on: ubuntu-latest
    name: SSOT + 스킬 wrapper drift 검증
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # runner 기본 버전에 의존하지 않고 고정 Node를 사용한다.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: 프로젝트 SSOT 건전성 검사
        run: bash bin/verify-ssot.sh --project-only

      - name: Backend CI 계약 검증
        run: node bin/verify-backend-ci-contract.mjs

      - name: 스킬 wrapper 동기화 검사
        run: bash bin/sync-skills.sh --check

      - name: Universal UI Parity 검증
        run: node bin/verify-parity.mjs

      - name: 런타임 시크릿 로더 검증
        run: npm run test:runtime-secrets

      - name: 실패 시 복구 안내
        if: failure()
        run: |
          echo "::error::SSOT drift / 스킬 wrapper 불일치 / Universal UI parity 위반. 로컬에서 다음을 실행하세요:"
          echo "  bin/setup.sh    # 최초 1회"
          echo "  bin/sync-skills.sh"
          echo "  bin/verify-ssot.sh"
          echo "  node bin/verify-backend-ci-contract.mjs"
          echo "  node bin/verify-parity.mjs"
