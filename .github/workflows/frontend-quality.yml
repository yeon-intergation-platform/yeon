name: Frontend Quality

# 프론트엔드 품질 게이트.
# 백엔드(backend-tests.yml)·SSOT(ssot-check.yml)와 달리, web/mobile/packages의
# typecheck·lint·단위 테스트를 PR에서 강제하는 워크플로가 없어 회귀가 묻히던 공백을 메운다.
# (전수 감사 PR에서 web vitest 21건 + auth 6건이 게이트 부재로 main에 머지된 전례)

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/frontend-quality.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/frontend-quality.yml"

permissions:
  contents: read

jobs:
  quality:
    # GitHub-hosted ubuntu-latest는 무료 private repo의 Actions 결제 차단에 막혀 잡이 시작되지 않는다.
    # 운영 self-hosted ARM64 러너로 고정한다. (단일 러너라 다른 워크플로와 순차 실행됨)
    runs-on: [self-hosted, Linux, ARM64]
    name: 타입체크 · 린트 · 프론트 단위 테스트
    env:
      # 대형 web 앱 tsc/vitest가 러너 기본 Node 힙(~2GB)을 초과해 OOM(exit 134) 나는 것을 방지.
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (turbo, 10 packages)
        run: pnpm typecheck

      - name: Lint (turbo, 10 packages)
        run: pnpm lint

      - name: Web 단위 테스트 (vitest)
        run: pnpm --filter @yeon/web test

      - name: Mobile 단위 테스트 (vitest)
        run: pnpm --filter @yeon/mobile exec vitest run
