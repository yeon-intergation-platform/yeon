name: Frontend Quality

# 프론트엔드 품질 게이트.
# 백엔드(backend-tests.yml)·SSOT(ssot-check.yml)와 달리, web/mobile/packages의
# typecheck·lint·단위 테스트를 PR에서 강제하는 워크플로가 없어 회귀가 묻히던 공백을 메운다.
# (전수 감사 PR에서 web vitest 21건 + auth 6건이 게이트 부재로 main에 머지된 전례)

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/frontend-quality.yml"
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "apps/mobile/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/frontend-quality.yml"

permissions:
  contents: read

jobs:
  quality:
    # 공개 저장소의 PR 코드는 job마다 폐기되는 GitHub-hosted runner에서만 실행한다.
    runs-on: ubuntu-latest
    name: 타입체크 · 린트 · 프론트 단위 테스트
    env:
      # 대형 web 앱 tsc/vitest가 러너 기본 Node 힙(~2GB)을 초과해 OOM(exit 134) 나는 것을 방지.
      NODE_OPTIONS: --max-old-space-size=4096
      # corepack이 pnpm 다운로드 시 비대화형 CI에서 멈추지 않도록 프롬프트 비활성화.
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # setup-node와 corepack으로 packageManager 핀을 활성화한다.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Enable pnpm (corepack)
        run: corepack enable && corepack prepare pnpm@11.5.2 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (turbo, 10 packages)
        run: pnpm typecheck

      - name: Lint (turbo, 10 packages)
        run: pnpm lint

      - name: Web 단위 테스트 (vitest)
        run: pnpm --filter @yeon/web test

      - name: 공개 콘텐츠 품질 audit
        run: pnpm --filter @yeon/web public-content:audit

      - name: Mobile 단위 테스트 (vitest)
        run: pnpm --filter @yeon/mobile exec vitest run
