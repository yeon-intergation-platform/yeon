name: Build, Push, and Deploy Docker Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-image.yml"
      - "Dockerfile"
      - ".dockerignore"
      - ".env.example"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "compose.prod.yml"
      - "compose.dev.yml"
      - "apps/web/**"
      - "apps/race-server/**"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: yeon-web-app
  RACE_IMAGE_REPOSITORY: yeon-race-server

jobs:
  build_amd64:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-amd64-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-

      - name: Build amd64 image by digest
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          build-args: |
            NODE_MEMORY=4096
            NEXT_PUBLIC_RACE_SERVER_URL=wss://race.yeon.world
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=yeon-web-amd64
          cache-to: type=gha,mode=max,scope=yeon-web-amd64

      - name: Export amd64 digest
        run: |
          rm -rf "${DIGEST_DIR}"
          mkdir -p "${DIGEST_DIR}"
          digest="${{ steps.build.outputs.digest }}"
          touch "${DIGEST_DIR}/${digest#sha256:}"

      - name: Upload amd64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-amd64
          path: ${{ env.DIGEST_DIR }}/*
          if-no-files-found: error
          retention-days: 1

  build_arm64:
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-arm64-${{ github.run_id }}-${{ github.run_attempt }}
      # Pi self-hosted runner 에 영구 보존되는 local buildx cache 경로.
      # type=gha 는 미국 blob storage 와의 지연으로 레이어 다운로드에 초당 0.5MB 수준밖에 안 나왔으므로
      # local 을 1차, GHCR registry 를 2차 fallback 으로 두어 네트워크 병목을 제거한다.
      # BUILDX_LOCAL_CACHE 는 Pi runner 유저의 실제 $HOME 이 /home/runner 가 아닐 수 있어
      # job-level env 에 하드코딩하지 않고 "Resolve BUILDX_LOCAL_CACHE" 스텝에서 $HOME 기준으로 해석한다.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Pi 고정 builder — 같은 BuildKit 데몬을 재사용해 --mount=type=cache(pnpm-store)가 run 간 보존된다.
          # 이름이 없으면 매 run 마다 새 컨테이너가 생성되어 mount cache가 항상 비어 pnpm cold start 발생.
          driver: docker-container
          name: yeon-web-arm64-builder

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-

      - name: 디스크·이미지 정리 (빌드 전)
        run: |
          docker image prune -f --filter "until=48h"
          # builder prune은 pnpm-store 등 BuildKit 인라인 캐시도 지우므로 pre-build에서는 제거.
          # 캐시 크기 관리는 post-build의 Buildx cache prune 스텝(until=168h)이 담당한다.

      - name: Resolve BUILDX_LOCAL_CACHE
        run: echo "BUILDX_LOCAL_CACHE=$HOME/.cache/buildx-yeon-web-arm64" >> "$GITHUB_ENV"

      - name: Prepare local buildx cache dir
        run: mkdir -p "${BUILDX_LOCAL_CACHE}"

      - name: Build arm64 image by digest
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          build-args: |
            NODE_MEMORY=3072
            NEXT_PUBLIC_RACE_SERVER_URL=wss://race.yeon.world
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          # provenance / sbom 은 cache export 를 무겁게 하고 여기선 쓰지 않으므로 off.
          provenance: false
          sbom: false
          cache-from: |
            type=local,src=${{ env.BUILDX_LOCAL_CACHE }}
            type=registry,ref=ghcr.io/hyeonjun0527/yeon-web-app:buildcache-arm64
          # local 은 Pi 디스크라 빠르므로 mode=max 로 모든 layer 보관, registry 는 cross-runner fallback 용이라 min 으로 충분.
          cache-to: |
            type=local,dest=${{ env.BUILDX_LOCAL_CACHE }},mode=max
            type=registry,ref=ghcr.io/hyeonjun0527/yeon-web-app:buildcache-arm64,mode=min

      - name: Export arm64 digest
        run: |
          rm -rf "${DIGEST_DIR}"
          mkdir -p "${DIGEST_DIR}"
          digest="${{ steps.build.outputs.digest }}"
          touch "${DIGEST_DIR}/${digest#sha256:}"

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-arm64
          path: ${{ env.DIGEST_DIR }}/*
          if-no-files-found: error
          retention-days: 1

      - name: Buildx cache prune (ARM64 local, 10GB 이하 유지)
        if: always()
        run: docker buildx prune -f --keep-storage 10GB --filter "until=168h" || true

  publish_manifest:
    if: github.ref == 'refs/heads/main'
    needs:
      - build_amd64
      - build_arm64
    runs-on: ubuntu-latest
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-manifest-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-

      # pattern: 'digest-*' 는 prefix match 라 race-server 용 artifact(`digest-race-amd64` 등)까지 잡아
      # digest 파일 개수 mismatch(3~4개)를 일으킨다. web 용 두 artifact 만 명시적으로 받는다.
      - name: Download web amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: digest-amd64
          path: ${{ env.DIGEST_DIR }}

      - name: Download web arm64 digest
        uses: actions/download-artifact@v4
        with:
          name: digest-arm64
          path: ${{ env.DIGEST_DIR }}

      - name: Create and push multi-arch manifest
        working-directory: ${{ env.DIGEST_DIR }}
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          all_entries=(*)
          digest_files=()
          ignored_files=()

          for entry in "${all_entries[@]}"; do
            [ -f "$entry" ] || continue

            if [[ "$entry" =~ ^[0-9a-f]{64}$ ]]; then
              digest_files+=("$entry")
            else
              ignored_files+=("$entry")
            fi
          done

          if [ "${#ignored_files[@]}" -gt 0 ]; then
            echo "manifest publish에서 무시한 비-digest 파일이 있습니다."
            printf ' - %s\n' "${ignored_files[@]}"
          fi

          if [ "${#digest_files[@]}" -ne 2 ]; then
            echo "digest 파일 개수가 예상과 다릅니다: ${#digest_files[@]}개"
            if [ "${#digest_files[@]}" -gt 0 ]; then
              printf ' - %s\n' "${digest_files[@]}"
            fi
            exit 1
          fi

          refs=()
          for digest in "${digest_files[@]}"; do
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "digest 파일 이름 형식이 잘못되었습니다: $digest"
              exit 1
            fi

            ref="${IMAGE}@sha256:${digest}"
            refs+=("$ref")

            for i in 1 2 3; do
              docker buildx imagetools inspect "$ref" >/dev/null 2>&1 && break
              if [ "$i" -eq 3 ]; then
                echo "source digest 확인 실패: $ref"
                exit 1
              fi
              echo "source digest 확인 실패 (${i}/3), 10초 후 재시도..."
              sleep 10
            done
          done

          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "manifest 태그가 비어 있습니다."
            exit 1
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(-t "$tag")
          done

          for i in 1 2 3; do
            docker buildx imagetools create "${tag_args[@]}" "${refs[@]}" && break
            if [ "$i" -eq 3 ]; then
              echo "manifest 생성 실패: 3회 시도 후 중단합니다."
              exit 1
            fi
            wait_seconds=$((i * 20))
            echo "manifest 생성 실패 (${i}/3), ${wait_seconds}초 후 재시도..."
            sleep "$wait_seconds"
          done

      - name: Inspect published image
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          first_tag="$(jq -r '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")"
          # GHCR manifest 전파 지연 대응: 최대 3회 재시도
          for i in 1 2 3; do
            docker buildx imagetools inspect "$first_tag" && break
            [ "$i" -eq 3 ] && exit 1
            echo "inspect 실패 (${i}/3), 20초 후 재시도..."
            sleep 20
          done

  build_race_amd64:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-race-amd64-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.RACE_IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-

      - name: Build race-server amd64 image by digest
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./apps/race-server/Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=yeon-race-amd64
          cache-to: type=gha,mode=max,scope=yeon-race-amd64

      - name: Export amd64 digest
        run: |
          rm -rf "${DIGEST_DIR}"
          mkdir -p "${DIGEST_DIR}"
          digest="${{ steps.build.outputs.digest }}"
          touch "${DIGEST_DIR}/${digest#sha256:}"

      - name: Upload amd64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-race-amd64
          path: ${{ env.DIGEST_DIR }}/*
          if-no-files-found: error
          retention-days: 1

  build_race_arm64:
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-race-arm64-${{ github.run_id }}-${{ github.run_attempt }}
      # BUILDX_LOCAL_CACHE 는 Pi runner 유저의 실제 $HOME 이 /home/runner 가 아닐 수 있어
      # job-level env 에 하드코딩하지 않고 "Resolve BUILDX_LOCAL_CACHE" 스텝에서 $HOME 기준으로 해석한다.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.RACE_IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # Pi 고정 builder — 같은 BuildKit 데몬을 재사용해 --mount=type=cache(pnpm-store)가 run 간 보존된다.
          driver: docker-container
          name: yeon-race-arm64-builder

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-

      - name: 디스크·이미지 정리 (빌드 전)
        run: |
          docker image prune -f --filter "until=48h"
          # builder prune은 pnpm-store 등 BuildKit 인라인 캐시도 지우므로 pre-build에서는 제거.
          # 캐시 크기 관리는 post-build의 Buildx cache prune 스텝(until=168h)이 담당한다.

      - name: Resolve BUILDX_LOCAL_CACHE
        run: echo "BUILDX_LOCAL_CACHE=$HOME/.cache/buildx-yeon-race-arm64" >> "$GITHUB_ENV"

      - name: Prepare local buildx cache dir
        run: mkdir -p "${BUILDX_LOCAL_CACHE}"

      - name: Build race-server arm64 image by digest
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ./apps/race-server/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          # provenance / sbom 은 cache export 를 무겁게 하고 여기선 쓰지 않으므로 off.
          provenance: false
          sbom: false
          cache-from: |
            type=local,src=${{ env.BUILDX_LOCAL_CACHE }}
            type=registry,ref=ghcr.io/hyeonjun0527/yeon-race-server:buildcache-arm64
          # local 은 Pi 디스크라 빠르므로 mode=max 로 모든 layer 보관, registry 는 cross-runner fallback 용이라 min 으로 충분.
          cache-to: |
            type=local,dest=${{ env.BUILDX_LOCAL_CACHE }},mode=max
            type=registry,ref=ghcr.io/hyeonjun0527/yeon-race-server:buildcache-arm64,mode=min

      - name: Export arm64 digest
        run: |
          rm -rf "${DIGEST_DIR}"
          mkdir -p "${DIGEST_DIR}"
          digest="${{ steps.build.outputs.digest }}"
          touch "${DIGEST_DIR}/${digest#sha256:}"

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-race-arm64
          path: ${{ env.DIGEST_DIR }}/*
          if-no-files-found: error
          retention-days: 1

      - name: Buildx cache prune (race ARM64 local, 10GB 이하 유지)
        if: always()
        run: docker buildx prune -f --keep-storage 10GB --filter "until=168h" || true

  publish_race_manifest:
    if: github.ref == 'refs/heads/main'
    needs:
      - build_race_amd64
      - build_race_arm64
    runs-on: ubuntu-latest
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-race-manifest-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.RACE_IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-

      - name: Download image digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ env.DIGEST_DIR }}
          pattern: digest-race-*
          merge-multiple: true

      - name: Create and push multi-arch manifest
        working-directory: ${{ env.DIGEST_DIR }}
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
          IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          all_entries=(*)
          digest_files=()
          for entry in "${all_entries[@]}"; do
            [ -f "$entry" ] || continue
            if [[ "$entry" =~ ^[0-9a-f]{64}$ ]]; then
              digest_files+=("$entry")
            fi
          done

          if [ "${#digest_files[@]}" -ne 2 ]; then
            echo "race-server digest 파일 개수가 예상과 다릅니다: ${#digest_files[@]}개"
            exit 1
          fi

          refs=()
          for digest in "${digest_files[@]}"; do
            ref="${IMAGE}@sha256:${digest}"
            refs+=("$ref")
            for i in 1 2 3; do
              docker buildx imagetools inspect "$ref" >/dev/null 2>&1 && break
              [ "$i" -eq 3 ] && { echo "race digest 확인 실패: $ref"; exit 1; }
              echo "race digest 확인 실패 (${i}/3), 10초 후 재시도..."
              sleep 10
            done
          done

          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "race manifest 태그가 비어 있습니다."
            exit 1
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(-t "$tag")
          done

          for i in 1 2 3; do
            docker buildx imagetools create "${tag_args[@]}" "${refs[@]}" && break
            [ "$i" -eq 3 ] && { echo "race manifest 생성 실패"; exit 1; }
            wait_seconds=$((i * 20))
            echo "race manifest 생성 실패 (${i}/3), ${wait_seconds}초 후 재시도..."
            sleep "$wait_seconds"
          done

  deploy_production:
    if: github.ref == 'refs/heads/main'
    needs:
      - publish_manifest
      - publish_race_manifest
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DEPLOY_DIR: /srv/yeon
      COMPOSE_FILE: compose.prod.yml
      IMAGE_TAG: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check deploy prerequisites
        run: |
          set -eu
          install -d "${DEPLOY_DIR}"
          test -f "${DEPLOY_DIR}/.env"
          command -v docker
          docker compose version
          docker network inspect yeon-edge >/dev/null 2>&1 || docker network create yeon-edge
          docker network inspect yeon-db-edge >/dev/null 2>&1 || docker network create yeon-db-edge

      - name: Sync compose file
        run: |
          set -eu
          install -m 644 "${COMPOSE_FILE}" "${DEPLOY_DIR}/${COMPOSE_FILE}"

      - name: Deploy on Raspberry Pi
        run: |
          set -eu
          owner_lower="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          cd "${DEPLOY_DIR}"
          export YEON_WEB_IMAGE="ghcr.io/${owner_lower}/yeon-web-app:${IMAGE_TAG}"
          export YEON_RACE_SERVER_IMAGE="ghcr.io/${owner_lower}/yeon-race-server:${IMAGE_TAG}"
          # Pi 네트워크 대응: pull 실패 시 최대 3회 재시도
          for i in 1 2 3; do
            docker compose -f "${COMPOSE_FILE}" pull && break
            [ "$i" -eq 3 ] && exit 1
            echo "pull 실패 (${i}/3), 30초 후 재시도..."
            sleep 30
          done
          # --force-recreate 제거: 변경된 서비스(web)만 재시작, DB는 불필요하게 재시작하지 않음
          # --wait: 모든 서비스가 healthy 상태가 될 때까지 대기 후 반환
          docker compose -f "${COMPOSE_FILE}" up -d --wait

      - name: Run DB migrations
        run: |
          set -eu
          DEPLOY_DIR="${DEPLOY_DIR}" COMPOSE_FILE="${COMPOSE_FILE}" bash scripts/migrate.sh
