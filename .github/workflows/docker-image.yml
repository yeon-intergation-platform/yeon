name: Build, Push, and Deploy Docker Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/docker-image.yml"
      - ".github/workflows/docker-build-web.yml"
      - ".github/workflows/docker-build-backend.yml"
      - ".github/workflows/docker-build-race.yml"
      - "Dockerfile"
      - ".dockerignore"
      - ".env.example"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "compose.prod.yml"
      - "compose.dev.yml"
      - "apps/backend/**"
      - "apps/web/**"
      - "apps/race-server/**"
      - "apps/mobile/**"
      - "packages/**"
  workflow_dispatch:

permissions:
  actions: write
  contents: read
  packages: write

concurrency:
  group: docker-image-${{ github.ref }}
  # main은 최신 run이 API로 stale run만 선별 취소한다. workflow-level 취소는 최신 run 역취소 위험이 있어 main에서는 끈다.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: yeon-web-app
  RACE_IMAGE_REPOSITORY: yeon-race-server
  BACKEND_IMAGE_REPOSITORY: yeon-backend

jobs:
  detect_changes:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.scope.outputs.web }}
      backend: ${{ steps.scope.outputs.backend }}
      race: ${{ steps.scope.outputs.race }}
      mobile: ${{ steps.scope.outputs.mobile }}
      should_run: ${{ steps.fresh_main.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: 최신 main 빌드 여부 확인
        id: fresh_main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu

          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${{ github.ref }}" != "refs/heads/main" ]]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin main
          latest_main_sha="$(git rev-parse FETCH_HEAD)"
          echo "latest_main_sha=${latest_main_sha}"
          echo "current_sha=${GITHUB_SHA}"

          if [ "${latest_main_sha}" != "${GITHUB_SHA}" ]; then
            echo "현재 run은 최신 main이 아니므로 성공 상태로 남기지 않고 자체 취소합니다."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            curl -fsSL -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/cancel" \
              >/dev/null || echo "현재 run 자체 취소 요청 실패 또는 이미 종료됨"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: 이전 main Docker run 취소
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.fresh_main.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          for status in queued in_progress pending waiting requested; do
            runs_api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/docker-image.yml/runs?branch=main&event=push&status=${status}&per_page=20"

            if ! runs_payload="$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$runs_api")"; then
              echo "${status} 상태 run 조회 실패: stale run 취소를 건너뜁니다."
              continue
            fi

            mapfile -t stale_run_ids < <(jq -r \
              --arg current_run_id "${GITHUB_RUN_ID}" \
              --arg current_sha "${GITHUB_SHA}" \
              '.workflow_runs[] | select((.id | tostring) != $current_run_id and .head_sha != $current_sha) | .id' \
              <<< "$runs_payload")

            for run_id in "${stale_run_ids[@]}"; do
              [ -n "$run_id" ] || continue
              echo "stale main Docker run 취소: ${run_id} (${status})"
              curl -fsSL -X POST \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/cancel" \
                >/dev/null || echo "run ${run_id} 취소 요청 실패 또는 이미 종료됨"
            done
          done

      - name: 변경 범위 판별
        id: scope
        run: |
          set -eu

          if [[ "${{ steps.fresh_main.outputs.should_run }}" != "true" ]]; then
            echo "최신 main이 아닌 run이므로 변경 서비스를 모두 false로 표시합니다."
            echo "web=false" >> "$GITHUB_OUTPUT"
            echo "backend=false" >> "$GITHUB_OUTPUT"
            echo "race=false" >> "$GITHUB_OUTPUT"
            echo "mobile=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "수동 실행은 전체 Docker 서비스와 mobile 검증을 최신 대상으로 표시합니다."
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "race=true" >> "$GITHUB_OUTPUT"
            echo "mobile=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mark_all_changed() {
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "race=true" >> "$GITHUB_OUTPUT"
            echo "mobile=true" >> "$GITHUB_OUTPUT"
          }

          base_sha="${{ github.event.before }}"

          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "main 배포는 마지막 운영 릴리즈 태그부터 현재 SHA까지 누적 diff로 변경 범위를 판별합니다."
            git fetch --tags --force
            latest_deploy_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"

            if [ -z "$latest_deploy_tag" ]; then
              echo "마지막 운영 릴리즈 태그를 찾지 못했습니다. 전체 서비스를 최신 대상으로 표시합니다."
              mark_all_changed
              exit 0
            fi

            base_sha="$(git rev-list -n 1 "$latest_deploy_tag" || true)"
            if [ -z "$base_sha" ]; then
              echo "릴리즈 태그의 기준 커밋을 확인할 수 없습니다: ${latest_deploy_tag}"
              mark_all_changed
              exit 0
            fi
            echo "마지막 운영 릴리즈 태그: ${latest_deploy_tag} (${base_sha})"
          fi

          if ! git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
            echo "기준 커밋을 확인할 수 없어 전체 서비스를 최신 대상으로 표시합니다: ${base_sha}"
            mark_all_changed
            exit 0
          fi

          if ! git merge-base --is-ancestor "${base_sha}" "${GITHUB_SHA}"; then
            echo "기준 커밋이 현재 커밋의 조상이 아니므로 전체 서비스를 최신 대상으로 표시합니다: ${base_sha}"
            mark_all_changed
            exit 0
          fi

          web="false"
          backend="false"
          race="false"
          mobile="false"

          while IFS= read -r file; do
            case "$file" in
              apps/web/*)
                web="true"
                ;;

              apps/backend/*)
                backend="true"
                ;;

              apps/race-server/*)
                race="true"
                ;;

              apps/mobile/*)
                mobile="true"
                ;;

              Dockerfile|.github/workflows/docker-image.yml|.github/workflows/docker-build-web.yml|.github/workflows/docker-build-backend.yml|.github/workflows/docker-build-race.yml|.dockerignore|.env.example|compose.dev.yml|compose.prod.yml)
                web="true"
                backend="true"
                race="true"
                ;;

              package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json)
                web="true"
                backend="true"
                race="true"
                mobile="true"
                ;;

              packages/api-contract/*|packages/api-client/*|packages/domain/*|packages/design-tokens/*|packages/utils/*)
                web="true"
                mobile="true"
                ;;

              packages/config/*)
                web="true"
                race="true"
                mobile="true"
                ;;

              packages/race-shared/*|packages/typing-race-engine/*)
                web="true"
                race="true"
                ;;
            esac
          done < <(git diff --name-only "${base_sha}" "${GITHUB_SHA}")

          echo "diff 기준: ${base_sha}..${GITHUB_SHA}"

          echo "web=$web"
          echo "backend=$backend"
          echo "race=$race"
          echo "mobile=$mobile"

          echo "web=$web" >> "$GITHUB_OUTPUT"
          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "race=$race" >> "$GITHUB_OUTPUT"
          echo "mobile=$mobile" >> "$GITHUB_OUTPUT"

  build_web:
    if: github.ref == 'refs/heads/main' && needs.detect_changes.outputs.web == 'true'
    needs: detect_changes
    uses: ./.github/workflows/docker-build-web.yml
    secrets: inherit

  build_backend:
    if: github.ref == 'refs/heads/main' && needs.detect_changes.outputs.backend == 'true'
    needs: detect_changes
    uses: ./.github/workflows/docker-build-backend.yml
    secrets: inherit

  build_race:
    if: github.ref == 'refs/heads/main' && needs.detect_changes.outputs.race == 'true'
    needs: detect_changes
    uses: ./.github/workflows/docker-build-race.yml
    secrets: inherit

  verify_mobile:
    if: github.ref == 'refs/heads/main' && needs.detect_changes.outputs.mobile == 'true'
    needs: detect_changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.7

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mobile typecheck
        run: pnpm --filter @yeon/mobile typecheck

  deploy_production:
    if: >
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.detect_changes.outputs.web == 'true' || needs.detect_changes.outputs.backend == 'true' || needs.detect_changes.outputs.race == 'true') &&
      (needs.detect_changes.outputs.web != 'true' || needs.build_web.result == 'success') &&
      (needs.detect_changes.outputs.race != 'true' || needs.build_race.result == 'success') &&
      (needs.detect_changes.outputs.backend != 'true' || needs.build_backend.result == 'success') &&
      (needs.detect_changes.outputs.mobile != 'true' || needs.verify_mobile.result == 'success')
    needs:
      - detect_changes
      - build_web
      - build_race
      - build_backend
      - verify_mobile
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DEPLOY_DIR: /srv/yeon
      COMPOSE_FILE: compose.prod.yml
      IMAGE_TAG: latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: 배포 실행 대상 확인
        id: fresh_main
        run: |
          set -euo pipefail

          git fetch --no-tags --depth=1 origin main
          latest_main_sha="$(git rev-parse FETCH_HEAD)"
          echo "latest_main_sha=${latest_main_sha}"
          echo "current_sha=${GITHUB_SHA}"

          if [ "${latest_main_sha}" != "${GITHUB_SHA}" ]; then
            echo "현재 run은 최신 main이 아니지만 deploy 단계까지 도달했으므로 이미 push된 SHA 이미지로 배포합니다."
            echo "최신 main run이 뒤이어 성공하면 최신 이미지로 다시 덮어씁니다."
          fi

          echo "deploy=true" >> "$GITHUB_OUTPUT"

      - name: GHCR 로그인
        if: steps.fresh_main.outputs.deploy == 'true'
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check deploy prerequisites
        if: steps.fresh_main.outputs.deploy == 'true'
        run: |
          set -eu
          install -d "${DEPLOY_DIR}"
          test -f "${DEPLOY_DIR}/.env"
          command -v docker
          docker compose version
          docker network inspect yeon-edge >/dev/null 2>&1 || docker network create yeon-edge
          docker network inspect yeon-db-edge >/dev/null 2>&1 || docker network create yeon-db-edge

      - name: Sync compose file
        if: steps.fresh_main.outputs.deploy == 'true'
        run: |
          set -eu
          install -m 644 "${COMPOSE_FILE}" "${DEPLOY_DIR}/${COMPOSE_FILE}"

      - name: Deploy on Raspberry Pi
        if: steps.fresh_main.outputs.deploy == 'true'
        run: |
          set -eu
          owner_lower="$(printf '%s' "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          cd "${DEPLOY_DIR}"
          services=()
          if [[ "${{ needs.detect_changes.outputs.backend }}" == "true" ]]; then
            services+=(backend)
          fi
          if [[ "${{ needs.detect_changes.outputs.web }}" == "true" ]]; then
            services+=(web)
          fi
          if [[ "${{ needs.detect_changes.outputs.race }}" == "true" ]]; then
            services+=(race-server)
          fi

          if [ "${#services[@]}" -eq 0 ]; then
            echo "변경된 서비스가 없어 배포를 스킵합니다."
            exit 0
          fi

          image_tag="sha-${GITHUB_SHA::7}"
          latest_tag="latest"
          echo "배포 이미지 태그: ${image_tag}"

          if [[ "${{ needs.detect_changes.outputs.web }}" == "true" ]]; then
            export YEON_WEB_IMAGE="ghcr.io/${owner_lower}/yeon-web-app:${image_tag}"
          else
            export YEON_WEB_IMAGE="ghcr.io/${owner_lower}/yeon-web-app:${latest_tag}"
          fi

          if [[ "${{ needs.detect_changes.outputs.backend }}" == "true" ]]; then
            export YEON_BACKEND_IMAGE="ghcr.io/${owner_lower}/yeon-backend:${image_tag}"
          else
            export YEON_BACKEND_IMAGE="ghcr.io/${owner_lower}/yeon-backend:${latest_tag}"
          fi

          if [[ "${{ needs.detect_changes.outputs.race }}" == "true" ]]; then
            export YEON_RACE_SERVER_IMAGE="ghcr.io/${owner_lower}/yeon-race-server:${image_tag}"
          else
            export YEON_RACE_SERVER_IMAGE="ghcr.io/${owner_lower}/yeon-race-server:${latest_tag}"
          fi

          echo "web image: ${YEON_WEB_IMAGE}"
          echo "backend image: ${YEON_BACKEND_IMAGE}"
          echo "race image: ${YEON_RACE_SERVER_IMAGE}"

          # Pi 네트워크 대응: pull 실패 시 최대 3회 재시도
          for i in 1 2 3; do
            docker compose -f "${COMPOSE_FILE}" pull "${services[@]}" && break
            [ "$i" -eq 3 ] && exit 1
            echo "pull 실패 (${i}/3), 30초 후 재시도..."
            sleep 30
          done

          preflight_http_service() {
            service="$1"
            container_name="$2"
            port="$3"
            path="$4"

            echo "${service} preflight: 새 ${service} 이미지를 운영 컨테이너 교체 전에 1회성으로 부팅 확인합니다."
            docker rm -f "${container_name}" >/dev/null 2>&1 || true

            cleanup_preflight() {
              docker logs "${container_name}" --tail=120 || true
              docker rm -f "${container_name}" >/dev/null 2>&1 || true
            }

            docker compose -f "${COMPOSE_FILE}" run -d --name "${container_name}" --no-deps -e PORT="${port}" "${service}" >/dev/null
            for _ in $(seq 1 30); do
              if ! docker inspect -f '{{.State.Running}}' "${container_name}" 2>/dev/null | grep -q true; then
                echo "::error::${service} preflight 컨테이너가 health 확인 전에 종료되었습니다."
                cleanup_preflight
                exit 1
              fi

              container_ip="$(docker inspect -f '{{range $name, $network := .NetworkSettings.Networks}}{{println $network.IPAddress}}{{end}}' "${container_name}" | awk 'NF {print; exit}')"
              if [ -n "${container_ip}" ] && curl -fsS "http://${container_ip}:${port}${path}" >/dev/null; then
                echo "${service} preflight: ${path} OK"
                docker rm -f "${container_name}" >/dev/null 2>&1 || true
                return 0
              fi

              sleep 2
            done

            echo "::error::${service} preflight health 확인 시간 초과: ${path}"
            cleanup_preflight
            exit 1
          }

          if [[ "${{ needs.detect_changes.outputs.backend }}" == "true" ]]; then
            preflight_http_service backend "yeon-backend-preflight-${GITHUB_RUN_ID}" 8081 /actuator/health
          fi
          if [[ "${{ needs.detect_changes.outputs.web }}" == "true" ]]; then
            preflight_http_service web "yeon-web-preflight-${GITHUB_RUN_ID}" 3100 /api/health
          fi
          if [[ "${{ needs.detect_changes.outputs.race }}" == "true" ]]; then
            preflight_http_service race-server "yeon-race-preflight-${GITHUB_RUN_ID}" 2568 /health
          fi

          # --force-recreate 제거: 변경된 서비스(web)만 재시작, DB는 불필요하게 재시작하지 않음
          # --wait: 모든 서비스가 healthy 상태가 될 때까지 대기 후 반환
          docker compose -f "${COMPOSE_FILE}" up -d --wait "${services[@]}"

          verify_image() {
            service="$1"
            expected_image="$2"
            container_id="$(docker compose -f "${COMPOSE_FILE}" ps -q "$service")"
            if [ -z "$container_id" ]; then
              echo "::error::${service} 컨테이너를 찾지 못했습니다."
              exit 1
            fi

            actual_image="$(docker inspect -f '{{.Config.Image}}' "$container_id")"
            echo "${service} running image: ${actual_image}"
            if [ "$actual_image" != "$expected_image" ]; then
              echo "::error::${service} 이미지 불일치: expected=${expected_image}, actual=${actual_image}"
              exit 1
            fi
          }

          if [[ "${{ needs.detect_changes.outputs.backend }}" == "true" ]]; then
            verify_image backend "${YEON_BACKEND_IMAGE}"
          fi
          if [[ "${{ needs.detect_changes.outputs.web }}" == "true" ]]; then
            verify_image web "${YEON_WEB_IMAGE}"
          fi
          if [[ "${{ needs.detect_changes.outputs.race }}" == "true" ]]; then
            verify_image race-server "${YEON_RACE_SERVER_IMAGE}"
          fi

          {
            echo "main_sha=${GITHUB_SHA}"
            echo "web_changed=${{ needs.detect_changes.outputs.web }}"
            echo "backend_changed=${{ needs.detect_changes.outputs.backend }}"
            echo "race_changed=${{ needs.detect_changes.outputs.race }}"
            echo "mobile_changed=${{ needs.detect_changes.outputs.mobile }}"
            echo "web_image=${YEON_WEB_IMAGE}"
            echo "backend_image=${YEON_BACKEND_IMAGE}"
            echo "race_image=${YEON_RACE_SERVER_IMAGE}"
          } > "${DEPLOY_DIR}/.deploy-state"

  verify_latest_completion:
    if: always() && github.ref == 'refs/heads/main'
    needs:
      - detect_changes
      - build_web
      - build_backend
      - build_race
      - verify_mobile
      - deploy_production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Verify workflow completion invariant
        env:
          WEB_CHANGED: ${{ needs.detect_changes.outputs.web }}
          BACKEND_CHANGED: ${{ needs.detect_changes.outputs.backend }}
          RACE_CHANGED: ${{ needs.detect_changes.outputs.race }}
          MOBILE_CHANGED: ${{ needs.detect_changes.outputs.mobile }}
          BUILD_WEB_RESULT: ${{ needs.build_web.result }}
          BUILD_BACKEND_RESULT: ${{ needs.build_backend.result }}
          BUILD_RACE_RESULT: ${{ needs.build_race.result }}
          VERIFY_MOBILE_RESULT: ${{ needs.verify_mobile.result }}
          DEPLOY_RESULT: ${{ needs.deploy_production.result }}
        run: |
          set -euo pipefail

          git fetch --no-tags --depth=1 origin main
          latest_main_sha="$(git rev-parse FETCH_HEAD)"
          if [ "$latest_main_sha" != "$GITHUB_SHA" ]; then
            echo "최신 main이 아닌 run입니다: current=${GITHUB_SHA}, latest=${latest_main_sha}"
            echo "deploy 단계에 도달한 stale run은 해당 SHA 이미지 배포까지 허용하고, 최신성 검증은 latest main run에 위임합니다."
            {
              echo "## 최신성 검증 위임"
              echo "- current: ${GITHUB_SHA}"
              echo "- latest: ${latest_main_sha}"
              echo "- result: stale run이므로 최신 main run에서 최종 build/deploy invariant를 확인합니다."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          fail_if_changed_not_success() {
            name="$1"
            changed="$2"
            result="$3"
            if [ "$changed" = "true" ] && [ "$result" != "success" ]; then
              echo "::error::${name} 최신 보장 실패: changed=${changed}, result=${result}"
              exit 1
            fi
          }

          fail_if_changed_not_success web "$WEB_CHANGED" "$BUILD_WEB_RESULT"
          fail_if_changed_not_success backend "$BACKEND_CHANGED" "$BUILD_BACKEND_RESULT"
          fail_if_changed_not_success race-server "$RACE_CHANGED" "$BUILD_RACE_RESULT"
          fail_if_changed_not_success mobile "$MOBILE_CHANGED" "$VERIFY_MOBILE_RESULT"

          if [ "$WEB_CHANGED" = "true" ] || [ "$BACKEND_CHANGED" = "true" ] || [ "$RACE_CHANGED" = "true" ]; then
            if [ "$DEPLOY_RESULT" != "success" ]; then
              echo "::error::Docker 서비스 배포 최신 보장 실패: deploy_result=${DEPLOY_RESULT}"
              exit 1
            fi
          fi

          {
            echo "## 최신성 보장 결과"
            echo "- main: ${GITHUB_SHA}"
            echo "- web: changed=${WEB_CHANGED}, build=${BUILD_WEB_RESULT}"
            echo "- backend: changed=${BACKEND_CHANGED}, build=${BUILD_BACKEND_RESULT}"
            echo "- race-server: changed=${RACE_CHANGED}, build=${BUILD_RACE_RESULT}"
            echo "- mobile: changed=${MOBILE_CHANGED}, typecheck=${VERIFY_MOBILE_RESULT}"
            echo "- deploy: ${DEPLOY_RESULT}"
          } >> "$GITHUB_STEP_SUMMARY"
