name: GitHub Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create_release:
    # GitHub-hosted ubuntu-latest는 무료 private repo의 Actions 결제 차단에 막힌다.
    # 태그 push 기반 릴리즈 공개도 운영 self-hosted ARM64 러너에서 수행한다.
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release
        run: |
          set -eu
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Report package version match
        run: |
          set +e
          node scripts/verify-release-version.mjs "${{ steps.release.outputs.tag }}"
          status="$?"
          set -e

          if [ "$status" -ne 0 ]; then
            echo "::warning::릴리즈 태그와 package.json version이 다릅니다. 배포 자동 SemVer 태그를 우선 사용합니다."
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          set -eu

          release_api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases"

          # self-hosted 러너엔 gh CLI가 없으므로 REST API로 릴리즈 존재 확인/생성을 처리한다.
          if curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${release_api}/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release already exists: ${TAG_NAME}"
            exit 0
          fi

          payload="$(printf '{"tag_name":"%s","name":"YEON %s","generate_release_notes":true}' "${TAG_NAME}" "${TAG_NAME}")"
          http_code="$(curl -sS -o /tmp/release-create.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${release_api}" -d "${payload}")"

          case "${http_code}" in
            201) echo "GitHub Release 생성: ${TAG_NAME}" ;;
            422) echo "GitHub Release already exists: ${TAG_NAME}" ;;
            *)
              echo "::error::GitHub Release 생성 실패: HTTP ${http_code}"
              cat /tmp/release-create.json || true
              exit 1
              ;;
          esac
