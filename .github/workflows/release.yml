name: GitHub Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create_release:
    # GitHub-hosted ubuntu-latest는 무료 private repo의 Actions 결제 차단에 막힌다.
    # 태그 push 기반 릴리즈 공개도 운영 self-hosted ARM64 러너에서 수행한다.
    runs-on: [self-hosted, Linux, ARM64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Resolve release tag
        id: release
        run: |
          set -eu
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Report package version match
        run: |
          set +e
          node scripts/verify-release-version.mjs "${{ steps.release.outputs.tag }}"
          status="$?"
          set -e

          if [ "$status" -ne 0 ]; then
            echo "::warning::릴리즈 태그와 package.json version이 다릅니다. 배포 자동 SemVer 태그를 우선 사용합니다."
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          set -eu
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release already exists: ${TAG_NAME}"
            exit 0
          fi

          gh release create "${TAG_NAME}" \
            --verify-tag \
            --title "YEON ${TAG_NAME}" \
            --generate-notes
