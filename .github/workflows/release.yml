name: GitHub Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create_release:
    if: github.ref == 'refs/heads/main'
    # 수동 복구 release도 default branch의 trusted workflow를 hosted runner에서 실행한다.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      - name: Resolve release tag
        id: release
        run: |
          set -eu
          tag="${{ github.event.inputs.tag }}"

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::유효한 SemVer tag가 아닙니다: ${tag}"
            exit 1
          fi

          git fetch --force origin main "refs/tags/${tag}:refs/tags/${tag}"
          tag_commit="$(git rev-list -n 1 "${tag}")"
          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "::error::main 이력에 없는 tag는 release할 수 없습니다: ${tag}"
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Report package version match
        run: |
          set +e
          node scripts/verify-release-version.mjs "${{ steps.release.outputs.tag }}"
          status="$?"
          set -e

          if [ "$status" -ne 0 ]; then
            echo "::warning::릴리즈 태그와 package.json version이 다릅니다. 배포 자동 SemVer 태그를 우선 사용합니다."
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.release.outputs.tag }}
        run: |
          set -eu

          release_api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases"

          # 별도 gh CLI 의존 없이 REST API로 릴리즈 존재 확인/생성을 처리한다.
          if curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${release_api}/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release already exists: ${TAG_NAME}"
            exit 0
          fi

          payload="$(printf '{"tag_name":"%s","name":"YEON %s","generate_release_notes":true}' "${TAG_NAME}" "${TAG_NAME}")"
          http_code="$(curl -sS -o /tmp/release-create.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${release_api}" -d "${payload}")"

          case "${http_code}" in
            201) echo "GitHub Release 생성: ${TAG_NAME}" ;;
            422) echo "GitHub Release already exists: ${TAG_NAME}" ;;
            *)
              echo "::error::GitHub Release 생성 실패: HTTP ${http_code}"
              cat /tmp/release-create.json || true
              exit 1
              ;;
          esac
