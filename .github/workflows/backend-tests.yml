name: Backend Tests & Reports

# 백엔드 테스트 게이트 + 리포트 노출.
# (Dockerfile 은 bootJar 만 하므로 테스트가 CI에서 돌지 않던 공백을 메운다.)
# - test-and-report: ./gradlew test(ArchUnit·추적성·springdoc·REST Docs·통합) + JaCoCo. 산출물 업로드.
# - karate-flows: 앱(Java25)을 띄우고 Karate(Java21 standalone)로 메인 흐름 검증 + HTML 리포트.

on:
  pull_request:
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-tests.yml"
  push:
    branches:
      - main
    paths:
      - "apps/backend/**"
      - ".github/workflows/backend-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-report:
    # 공개 저장소의 PR 코드는 영속 self-hosted runner에서 실행하지 않는다.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Run tests + JaCoCo + 핵심 패키지 커버리지 검증 (Testcontainers uses runner Docker)
        working-directory: apps/backend
        run: ./gradlew --no-daemon test jacocoTestReport jacocoTestCoverageVerification

      - name: Upload JaCoCo coverage report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-jacoco-report
          path: apps/backend/build/reports/jacoco/test/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload REST Docs snippets
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-restdocs-snippets
          path: apps/backend/build/generated-snippets/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload JUnit results
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-junit-results
          path: apps/backend/build/test-results/test/
          if-no-files-found: warn
          retention-days: 14

  karate-flows:
    # 서비스 컨테이너가 매 job 폐기되는 GitHub-hosted runner에서 Karate를 검증한다.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-bookworm
        env:
          POSTGRES_USER: yeon_local
          POSTGRES_PASSWORD: yeon_local
          POSTGRES_DB: yeon_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U yeon_local -d yeon_local"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up JDK 21 (Karate runtime)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up JDK 25 (app runtime)
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Install PostgreSQL client
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends postgresql-client
          fi

      - name: Prepare isolated backend port
        run: |
          set -euo pipefail
          base_port=$((18000 + (GITHUB_RUN_ID % 20000)))
          selected_port=""
          for offset in $(seq 0 99); do
            candidate=$((base_port + offset))
            if [ "$candidate" -gt 60999 ]; then
              candidate=$((18000 + offset))
            fi
            if ! (echo >"/dev/tcp/127.0.0.1/${candidate}") >/dev/null 2>&1; then
              selected_port="$candidate"
              break
            fi
          done
          if [ -z "$selected_port" ]; then
            echo "::error::Karate backend 실행용 빈 포트를 찾지 못했습니다."
            exit 1
          fi
          echo "KARATE_BACKEND_PORT=${selected_port}" >> "$GITHUB_ENV"
          echo "KARATE_BASE_URL=http://localhost:${selected_port}" >> "$GITHUB_ENV"

      - name: Start backend (Java 25, dev.local) in background
        working-directory: apps/backend
        env:
          SPRING_PROFILES_ACTIVE: dev.local
          DATABASE_URL: postgresql://yeon_local:yeon_local@localhost:5432/yeon_local
          SPRING_INTERNAL_TOKEN: local-dev-internal-token
          # AuthTokenHasher @PostConstruct fail-fast(최소 길이 검증)로 앱 부팅이 막히지 않도록
          # 로컬 dev 전용 AUTH_SECRET 을 주입한다(운영 비밀 아님, CI 기동 전용).
          AUTH_SECRET: local-dev-karate-auth-secret-0123456789abcdef
          CARD_ASSET_LOCAL_FALLBACK: "true"
        run: |
          set -euo pipefail
          ./gradlew --no-daemon bootRun --args="--server.port=${KARATE_BACKEND_PORT}" > /tmp/backend-boot.log 2>&1 &
          backend_pid=$!
          echo "KARATE_BACKEND_PID=${backend_pid}" >> "$GITHUB_ENV"
          for i in $(seq 1 60); do
            if ! kill -0 "$backend_pid" >/dev/null 2>&1; then
              echo "::error::backend process exited before health became ready"
              tail -120 /tmp/backend-boot.log || true
              exit 1
            fi
            if curl -fsS "${KARATE_BASE_URL}/actuator/health" >/dev/null 2>&1; then
              echo "backend up after ${i} tries"
              exit 0
            fi
            sleep 3
          done
          echo "::error::backend did not start"
          tail -120 /tmp/backend-boot.log
          exit 1

      - name: Verify migrated schema before seeding
        run: |
          set -euo pipefail
          for i in $(seq 1 60); do
            if ! kill -0 "${KARATE_BACKEND_PID}" >/dev/null 2>&1; then
              echo "::error::backend process exited before Flyway schema preflight completed"
              tail -120 /tmp/backend-boot.log || true
              exit 1
            fi
            users_table_exists="$(
              PGPASSWORD=yeon_local psql -h localhost -U yeon_local -d yeon_local -Atq \
                -c "select exists (select 1 from information_schema.tables where table_schema = 'public' and table_name = 'users');" 2>/tmp/backend-schema-preflight.err || true
            )"
            if [ "$users_table_exists" = "t" ]; then
              echo "public.users is ready after ${i} tries"
              exit 0
            fi
            sleep 2
          done

          echo "::error::backend health is up, but public.users is not migrated. Seed is blocked to expose the real Flyway/schema failure."
          echo "::group::schema preflight stderr"
          cat /tmp/backend-schema-preflight.err || true
          echo "::endgroup::"
          echo "::group::flyway schema history"
          PGPASSWORD=yeon_local psql -h localhost -U yeon_local -d yeon_local \
            -c "select installed_rank, version, description, success from yeon_backend.flyway_schema_history order by installed_rank;" || true
          echo "::endgroup::"
          echo "::group::backend boot log"
          tail -160 /tmp/backend-boot.log || true
          echo "::endgroup::"
          exit 1

      - name: Seed traceability test user
        run: |
          set -euo pipefail
          PGPASSWORD=yeon_local psql -v ON_ERROR_STOP=1 -h localhost -U yeon_local -d yeon_local -c \
            "INSERT INTO public.users (id,email,display_name) VALUES ('11111111-1111-1111-1111-111111111111','karate@test.local','Karate Test') ON CONFLICT (id) DO NOTHING;"

      - name: Run Karate main-flow features (Java 21 standalone)
        env:
          KARATE_SEED_USER: "0"
        run: |
          # setup-java 가 노출한 JDK 21 홈을 Karate 실행에 사용(앱은 Java 25 로 이미 기동).
          export KARATE_JAVA_HOME="${JAVA_HOME_21_ARM64:-${JAVA_HOME_21_AARCH64:-${JAVA_HOME_21_X64:-}}}"
          if [ -z "$KARATE_JAVA_HOME" ]; then
            echo "::error::setup-java JDK 21 home not found. Available JAVA_HOME_21_* values:"
            env | sort | grep '^JAVA_HOME_21_' || true
            exit 1
          fi
          bash apps/backend/src/test/resources/karate/run-flows.sh

      - name: Stop backend
        if: ${{ always() }}
        run: |
          if [ -n "${KARATE_BACKEND_PID:-}" ] && kill -0 "${KARATE_BACKEND_PID}" >/dev/null 2>&1; then
            kill "${KARATE_BACKEND_PID}" || true
          fi

      - name: Upload Karate HTML report
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: backend-karate-report
          # run-flows.sh 가 karate 리소스 디렉터리에서 실행되므로 리포트가 그 아래 생성된다.
          path: apps/backend/src/test/resources/karate/target/karate-reports/
          if-no-files-found: warn
          retention-days: 14
