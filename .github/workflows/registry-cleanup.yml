name: Registry Image Cleanup

# ghcr.io 레지스트리 이미지 자동정리.
# docker-build-*.yml은 셀프호스트 러너의 "로컬" Docker만 prune한다(레지스트리 무관).
# main push마다 sha-* 태그 + push-by-digest의 untagged 매니페스트 + buildcache가
# ghcr.io(yeon-web-app/yeon-race-server/yeon-backend)에 무한 누적되므로, 주기적으로
# 오래된 버전을 보존 정책으로 삭제한다. latest/develop/buildcache-arm64는 보호한다.

on:
  schedule:
    # 매주 일요일 18:00 UTC.
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "삭제 없이 대상만 출력(true/false)"
        required: false
        default: "false"

permissions:
  packages: write

concurrency:
  group: registry-cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    # GitHub-hosted ubuntu-latest는 무료 private repo의 Actions 결제 차단에 막힌다.
    # 운영 self-hosted ARM64 러너에서 수행한다. snok 액션 이미지는 amd64 전용이라 ARM64에서
    # 그대로 실행하면 "exec format error"가 난다. setup-qemu로 binfmt를 등록해 emulation으로 실행한다.
    runs-on: [self-hosted, Linux, ARM64]
    name: ghcr 오래된 이미지 정리
    steps:
      - name: Set up QEMU (amd64 binfmt 등록 — snok 액션 emulation 실행)
        uses: docker/setup-qemu-action@v3.2.0

      - name: Prune old container image versions
        uses: snok/container-retention-policy@v3.1.0
        with:
          account: ${{ github.repository_owner }}
          # 기본은 GITHUB_TOKEN(packages: write). 조직 패키지 권한이 부족해 403이면
          # delete:packages 권한의 PAT를 secrets.GHCR_CLEANUP_TOKEN 에 등록한다.
          token: ${{ secrets.GHCR_CLEANUP_TOKEN || secrets.GITHUB_TOKEN }}
          image-names: "yeon-web-app yeon-race-server yeon-backend"
          # 운영/배포 캐시 태그는 삭제 대상에서 제외(보호).
          image-tags: "!latest !develop !buildcache-arm64"
          tag-selection: both
          # 1주보다 오래된 버전만 후보.
          cut-off: 1w
          # 후보 중 최신 15개는 보존(롤백 여유).
          keep-n-most-recent: 15
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
