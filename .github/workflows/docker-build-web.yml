name: Docker Build Web Image

on:
  workflow_call:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: yeon-web-app

# amd64 빌드는 GitHub-hosted ubuntu-latest에서만 가능했는데, 무료 private repo의 Actions
# 결제 차단으로 그 잡이 시작되지 않아 전체 파이프라인이 막혔다. 현재 유일한 운영 배포 타깃은
# 라즈베리파이(ARM64) self-hosted 러너이고 amd64 이미지는 소비처가 없으므로 arm64 단일 아키로 빌드한다.
# N100(amd64) 이전 시 docs/deployment/n100-proxmox-cutover.md에 따라 yeon-prod-amd64(X64) 러너에서
# amd64 빌드 잡과 multi-arch manifest를 복원한다.
jobs:
  build_arm64:
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-arm64-${{ github.run_id }}-${{ github.run_attempt }}
      # Pi self-hosted runner 에 영구 보존되는 local buildx cache 경로.
      # type=gha 는 미국 blob storage 와의 지연으로 레이어 다운로드에 초당 0.5MB 수준밖에 안 나왔으므로
      # local 을 1차, GHCR registry 를 2차 fallback 으로 두어 네트워크 병목을 제거한다.
      # BUILDX_LOCAL_CACHE 는 Pi runner 유저의 실제 $HOME 이 /home/runner 가 아닐 수 있어
      # job-level env 에 하드코딩하지 않고 "Resolve BUILDX_LOCAL_CACHE" 스텝에서 $HOME 기준으로 해석한다.

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
        with:
          # Pi 고정 builder — 같은 BuildKit 데몬을 재사용해 --mount=type=cache(pnpm-store)가 run 간 보존된다.
          # 이름이 없으면 매 run 마다 새 컨테이너가 생성되어 mount cache가 항상 비어 pnpm cold start 발생.
          driver: docker-container
          name: yeon-web-arm64-builder

      - name: GHCR 로그인
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      - name: 디스크·이미지 정리 (빌드 전)
        run: |
          docker image prune -f --filter "until=48h"
          # builder prune은 pnpm-store 등 BuildKit 인라인 캐시도 지우므로 pre-build에서는 제거.
          # 캐시 크기 관리는 post-build의 Buildx cache prune 스텝(until=168h)이 담당한다.

      - name: Resolve BUILDX_LOCAL_CACHE
        run: echo "BUILDX_LOCAL_CACHE=$HOME/.cache/buildx-yeon-web-arm64" >> "$GITHUB_ENV"

      - name: Prepare local buildx cache dir
        run: mkdir -p "${BUILDX_LOCAL_CACHE}"

      - name: Build arm64 image by digest
        uses: docker/build-push-action@v7.1.0
        id: build
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          build-args: |
            NODE_MEMORY=3072
            NEXT_PUBLIC_RACE_SERVER_URL=wss://race.yeon.world
          outputs: type=image,name=${{ steps.image.outputs.ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ steps.meta.outputs.labels }}
          # provenance / sbom 은 cache export 를 무겁게 하고 여기선 쓰지 않으므로 off.
          provenance: false
          sbom: false
          cache-from: |
            type=local,src=${{ env.BUILDX_LOCAL_CACHE }}
            type=registry,ref=${{ steps.image.outputs.ref }}:buildcache-arm64
          # local 은 Pi 디스크라 빠르므로 mode=max 로 모든 layer 보관, registry 는 cross-runner fallback 용이라 min 으로 충분.
          cache-to: |
            type=local,dest=${{ env.BUILDX_LOCAL_CACHE }},mode=max
            type=registry,ref=${{ steps.image.outputs.ref }}:buildcache-arm64,mode=min

      - name: Export arm64 digest
        run: |
          rm -rf "${DIGEST_DIR}"
          mkdir -p "${DIGEST_DIR}"
          digest="${{ steps.build.outputs.digest }}"
          touch "${DIGEST_DIR}/${digest#sha256:}"

      - name: Upload arm64 digest
        uses: actions/upload-artifact@v7.0.1
        with:
          name: digest-arm64
          path: ${{ env.DIGEST_DIR }}/*
          if-no-files-found: error
          retention-days: 1

      - name: Buildx 캐시 정리 (빌더 prune + local 캐시 디렉터리 상한)
        if: always()
        run: |
          docker buildx prune -f --keep-storage 10GB --filter "until=168h" || true
          # type=local 캐시는 buildx prune 대상이 아니라 오래된 blob이 누적될 수 있다.
          # 8GB 초과 시 비워 무한 증가를 막는다(다음 빌드는 cold, 이후 다시 캐시됨).
          if [ -n "${BUILDX_LOCAL_CACHE:-}" ] && [ -d "${BUILDX_LOCAL_CACHE}" ]; then
            used_kb="$(du -sk "${BUILDX_LOCAL_CACHE}" | awk '{print $1}')"
            if [ "${used_kb}" -gt $((8 * 1024 * 1024)) ]; then
              echo "local buildx 캐시 ${used_kb}KB > 8GB → 비웁니다."
              rm -rf "${BUILDX_LOCAL_CACHE:?}/"* || true
            fi
          fi

  publish_manifest:
    needs:
      - build_arm64
    # arm64 단일 아키 manifest 태깅도 self-hosted ARM64 러너에서 수행한다(billing 무관).
    runs-on: [self-hosted, Linux, ARM64]
    env:
      DIGEST_DIR: ${{ github.workspace }}/.ci-digests/digests-manifest-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Resolve lowercase image name
        id: image
        run: |
          owner_lower="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${owner_lower}/${{ env.IMAGE_REPOSITORY }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: GHCR 로그인
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            type=sha,format=short,prefix=sha-

      # arm64 단일 아키이므로 web arm64 digest 하나만 받는다.
      - name: Download web arm64 digest
        uses: actions/download-artifact@v8.0.1
        with:
          name: digest-arm64
          path: ${{ env.DIGEST_DIR }}

      - name: Create and push multi-arch manifest
        working-directory: ${{ env.DIGEST_DIR }}
        env:
          # self-hosted ARM64 러너에는 jq가 없으므로 metadata-action의 개행 구분 tags 출력을 직접 쓴다.
          METADATA_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE: ${{ steps.image.outputs.ref }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          all_entries=(*)
          digest_files=()
          ignored_files=()

          for entry in "${all_entries[@]}"; do
            [ -f "$entry" ] || continue

            if [[ "$entry" =~ ^[0-9a-f]{64}$ ]]; then
              digest_files+=("$entry")
            else
              ignored_files+=("$entry")
            fi
          done

          if [ "${#ignored_files[@]}" -gt 0 ]; then
            echo "manifest publish에서 무시한 비-digest 파일이 있습니다."
            printf ' - %s\n' "${ignored_files[@]}"
          fi

          if [ "${#digest_files[@]}" -ne 1 ]; then
            echo "digest 파일 개수가 예상과 다릅니다: ${#digest_files[@]}개"
            if [ "${#digest_files[@]}" -gt 0 ]; then
              printf ' - %s\n' "${digest_files[@]}"
            fi
            exit 1
          fi

          refs=()
          for digest in "${digest_files[@]}"; do
            if [[ ! "$digest" =~ ^[0-9a-f]{64}$ ]]; then
              echo "digest 파일 이름 형식이 잘못되었습니다: $digest"
              exit 1
            fi

            ref="${IMAGE}@sha256:${digest}"
            refs+=("$ref")

            for i in 1 2 3; do
              docker buildx imagetools inspect "$ref" >/dev/null 2>&1 && break
              if [ "$i" -eq 3 ]; then
                echo "source digest 확인 실패: $ref"
                exit 1
              fi
              echo "source digest 확인 실패 (${i}/3), 10초 후 재시도..."
              sleep 10
            done
          done

          mapfile -t tags < <(printf '%s\n' "$METADATA_TAGS" | sed '/^[[:space:]]*$/d')
          if [ "${#tags[@]}" -eq 0 ]; then
            echo "manifest 태그가 비어 있습니다."
            exit 1
          fi

          tag_args=()
          for tag in "${tags[@]}"; do
            tag_args+=(-t "$tag")
          done

          for i in 1 2 3; do
            docker buildx imagetools create "${tag_args[@]}" "${refs[@]}" && break
            if [ "$i" -eq 3 ]; then
              echo "manifest 생성 실패: 3회 시도 후 중단합니다."
              exit 1
            fi
            wait_seconds=$((i * 20))
            echo "manifest 생성 실패 (${i}/3), ${wait_seconds}초 후 재시도..."
            sleep "$wait_seconds"
          done

      - name: Inspect published image
        env:
          METADATA_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          first_tag="$(printf '%s\n' "$METADATA_TAGS" | sed '/^[[:space:]]*$/d' | head -n1)"
          # GHCR manifest 전파 지연 대응: 최대 3회 재시도
          for i in 1 2 3; do
            docker buildx imagetools inspect "$first_tag" && break
            [ "$i" -eq 3 ] && exit 1
            echo "inspect 실패 (${i}/3), 20초 후 재시도..."
            sleep 20
          done
