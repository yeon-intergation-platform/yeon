name: Auto SemVer Release After Deploy

on:
  workflow_run:
    workflows:
      - Build, Push, and Deploy Docker Image
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: auto-semver-release-main
  cancel-in-progress: false

jobs:
  create_release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch') &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve next SemVer tag
        id: version
        shell: bash
        run: |
          set -eu

          git fetch --tags --force

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
          if [ -z "${latest_tag}" ]; then
            major=0
            minor=0
            patch=1
          elif [[ "${latest_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="$((BASH_REMATCH[3] + 1))"
          else
            echo "SemVer 태그를 해석할 수 없습니다: ${latest_tag}" >&2
            exit 1
          fi

          next_tag="v${major}.${minor}.${patch}"
          while git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null; do
            patch="$((patch + 1))"
            next_tag="v${major}.${minor}.${patch}"
          done

          echo "tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "다음 릴리즈 태그: ${next_tag}"

      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -eu

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release already exists: ${TAG_NAME}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            git tag -a "${TAG_NAME}" "${TARGET_SHA}" -m "${TAG_NAME}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

          gh release create "${TAG_NAME}" \
            --verify-tag \
            --title "YEON ${TAG_NAME}" \
            --generate-notes
