name: Auto SemVer Release After Deploy

on:
  workflow_run:
    workflows:
      - Build, Push, and Deploy Docker Image
    types:
      - completed

permissions:
  contents: write
  # SemVer bump 판정 시 PR title/body/label 신호를 REST API로 읽기 위해 필요.
  pull-requests: read

concurrency:
  group: auto-semver-release-main
  cancel-in-progress: false

jobs:
  create_release:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch') &&
      github.event.workflow_run.head_branch == 'main'
    # release metadata 작업은 운영 Docker host가 필요 없는 hosted runner에서 수행한다.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployed commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: 최신 main 릴리즈 여부 확인
        id: fresh_main
        shell: bash
        run: |
          set -eu
          git fetch --no-tags --depth=1 origin main
          latest_main_sha="$(git rev-parse FETCH_HEAD)"
          echo "latest_main_sha=${latest_main_sha}"
          echo "workflow_sha=${{ github.event.workflow_run.head_sha }}"
          if [ "${latest_main_sha}" != "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "완료된 배포 run이 최신 main이 아니므로 릴리즈 생성을 스킵합니다."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "release=true" >> "$GITHUB_OUTPUT"

      - name: Resolve next SemVer tag
        if: steps.fresh_main.outputs.release == 'true'
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -eu

          git fetch --tags --force

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
          if [ -z "${latest_tag}" ]; then
            range=""
            major=0
            minor=0
            patch=1
          elif [[ "${latest_tag}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            range="${latest_tag}..${TARGET_SHA}"
            major="${BASH_REMATCH[1]}"
            minor="${BASH_REMATCH[2]}"
            patch="${BASH_REMATCH[3]}"
          else
            echo "SemVer 태그를 해석할 수 없습니다: ${latest_tag}" >&2
            exit 1
          fi

          bump="patch"
          release_context=""
          if [ -n "${range}" ]; then
            release_context="$(git log --format='%s%n%b' "${range}" || true)"
          else
            release_context="$(git log --format='%s%n%b' --max-count=50 "${TARGET_SHA}" || true)"
          fi

          pr_numbers="$(printf '%s\n' "${release_context}" | grep -Eo '#[0-9]+' | tr -d '#' | sort -u || true)"
          if [ -n "${pr_numbers}" ]; then
            while IFS= read -r pr_number; do
              [ -z "${pr_number}" ] && continue
              # CLI 설치 여부와 무관하게 REST API 원본 JSON을 그대로 컨텍스트에 덧붙인다.
              # 아래 grep이 JSON 안의 semver/release 신호(title·body·label)를 직접 스캔한다.
              pr_payload="$(curl -fsSL \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" 2>/dev/null || true)"
              [ -z "${pr_payload}" ] && continue
              printf -v release_context '%s\n%s' "${release_context}" "${pr_payload}"
            done <<< "${pr_numbers}"
          fi

          if printf '%s\n' "${release_context}" | grep -Eiq '(^|[^a-zA-Z0-9_-])(BREAKING CHANGE|semver:major|release:major|major release)([^a-zA-Z0-9_-]|$)|^[a-z]+(\([^)]+\))?!:'; then
            bump="major"
          elif printf '%s\n' "${release_context}" | grep -Eiq '(^|[^a-zA-Z0-9_-])(semver:minor|release:minor|minor release)([^a-zA-Z0-9_-]|$)|^feat(\([^)]+\))?:'; then
            bump="minor"
          elif printf '%s\n' "${release_context}" | grep -Eiq '(^|[^a-zA-Z0-9_-])(semver:patch|release:patch|patch release)([^a-zA-Z0-9_-]|$)|^(fix|perf|refactor|ci|docs|chore|test|style|build)(\([^)]+\))?:'; then
            bump="patch"
          fi

          case "${bump}" in
            major)
              major="$((major + 1))"
              minor=0
              patch=0
              ;;
            minor)
              minor="$((minor + 1))"
              patch=0
              ;;
            patch)
              patch="$((patch + 1))"
              ;;
            *)
              echo "지원하지 않는 SemVer bump입니다: ${bump}" >&2
              exit 1
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          while git rev-parse -q --verify "refs/tags/${next_tag}" >/dev/null; do
            patch="$((patch + 1))"
            next_tag="v${major}.${minor}.${patch}"
          done

          echo "bump=${bump}" >> "$GITHUB_OUTPUT"
          echo "tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "SemVer bump: ${bump}"
          echo "다음 릴리즈 태그: ${next_tag}"

      - name: Create tag and GitHub Release
        if: steps.fresh_main.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -eu

          release_api="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases"

          # 별도 gh CLI 의존 없이 REST API로 릴리즈 존재 확인/생성을 처리한다.
          if curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${release_api}/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "GitHub Release already exists: ${TAG_NAME}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git ls-remote --exit-code --tags origin "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            git tag -a "${TAG_NAME}" "${TARGET_SHA}" -m "${TAG_NAME}"
            git push origin "refs/tags/${TAG_NAME}"
          fi

          # generate_release_notes로 릴리즈 노트를 자동 생성한다.
          payload="$(printf '{"tag_name":"%s","name":"YEON %s","generate_release_notes":true}' "${TAG_NAME}" "${TAG_NAME}")"
          http_code="$(curl -sS -o /tmp/release-create.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${release_api}" -d "${payload}")"

          # 422는 동시 트리거된 release.yml이 먼저 만든 경우(이미 존재)이므로 성공 처리.
          case "${http_code}" in
            201) echo "GitHub Release 생성: ${TAG_NAME}" ;;
            422) echo "GitHub Release already exists: ${TAG_NAME}" ;;
            *)
              echo "::error::GitHub Release 생성 실패: HTTP ${http_code}"
              cat /tmp/release-create.json || true
              exit 1
              ;;
          esac
