spring:
  application:
    name: yeon-backend
  servlet:
    multipart:
      # 카드 이미지 업로드는 서비스단에서 5MB까지 허용한다. 서블릿 멀티파트 기본값(1MB)이
      # 더 낮으면 컨트롤러 도달 전에 잘려 대부분의 사진(>1MB) 등록이 실패하므로, 서비스
      # 한도보다 약간 큰 6MB로 올려 5MB 검증이 사용자에게 친절한 에러로 노출되게 한다.
      max-file-size: 6MB
      max-request-size: 10MB
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: yeon_backend
    schemas: yeon_backend

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health

# Bugsink 오류 수집. Bugsink는 Sentry SDK 호환이므로 Sentry Java SDK를 사용한다.
# BUGSINK_DSN 또는 SENTRY_DSN 이 없으면 SDK는 전송하지 않는다.
sentry:
  dsn: ${BUGSINK_DSN:${SENTRY_DSN:}}
  environment: ${SENTRY_ENV:${APP_ENV:dev}}
  traces-sample-rate: ${SENTRY_TRACES_RATE:0.0}
  send-default-pii: false
