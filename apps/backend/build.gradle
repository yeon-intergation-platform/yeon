plugins {
	id 'java'
	id 'jacoco'
	id 'org.springframework.boot' version '4.0.6'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'world.yeon'
version = '0.0.1-SNAPSHOT'
description = 'Yeon Spring backend bootstrap app'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-actuator'
	implementation 'org.springframework.boot:spring-boot-starter-security'
	implementation 'org.bouncycastle:bcprov-jdk18on:1.79'
	implementation 'org.springframework.boot:spring-boot-starter-jdbc'
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.flywaydb:flyway-core'
	implementation 'org.springframework.boot:spring-boot-flyway'
	implementation 'org.flywaydb:flyway-database-postgresql'
	runtimeOnly 'org.postgresql:postgresql'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-webmvc'
	implementation 'org.apache.poi:poi-ooxml:5.4.1'
	implementation 'org.apache.pdfbox:pdfbox:3.0.5'
	// 관리자 Markdown 검증과 공개 renderer의 CommonMark 의미 체계를 맞춘다.
	implementation 'org.commonmark:commonmark:0.28.0'
	developmentOnly 'org.springframework.boot:spring-boot-devtools'
	implementation 'software.amazon.awssdk:s3:2.31.68'
	implementation 'com.google.auth:google-auth-library-oauth2-http:1.30.1'
	// OpenAPI 계약 자동 생성(Swagger UI 포함). 3.0.x 라인이 Spring Boot 4 / Spring Framework 7 대응.
	implementation 'org.springdoc:springdoc-openapi-starter-webmvc-ui:3.0.3'
	// Bugsink는 Sentry SDK 호환 에러 트래커다. DSN 미설정 시 no-op.
	implementation 'io.sentry:sentry-spring-boot-4-starter:8.44.0'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testImplementation 'org.springframework.boot:spring-boot-restdocs'
	testImplementation 'org.springframework.restdocs:spring-restdocs-mockmvc'
	testImplementation 'org.springframework.boot:spring-boot-testcontainers'
	testImplementation 'org.springframework.boot:spring-boot-webmvc-test'
	testImplementation 'org.springframework.security:spring-security-test'
	testImplementation 'org.testcontainers:testcontainers-junit-jupiter'
	testImplementation 'org.testcontainers:testcontainers-postgresql'
	testImplementation 'com.tngtech.archunit:archunit-junit5:1.4.2'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('test') {
	useJUnitPlatform()
	// 테스트 JVM에 인증 시크릿을 제공한다(AuthTokenHasher fail-fast가 컨텍스트 로드를 막지 않도록).
	environment 'AUTH_SECRET', 'test-auth-secret-0123456789abcdef'
	// 전체 스위트 + testcontainers 동시 컨텍스트로 인한 힙 부족(OOM) 방지.
	maxHeapSize = '2g'
	finalizedBy tasks.named('jacocoTestReport')
}

jacoco {
	// Java 25 바이트코드(major 69) 계측 지원 버전.
	toolVersion = '0.8.14'
}

tasks.named('jacocoTestReport') {
	dependsOn tasks.named('test')
	reports {
		html.required = true
		xml.required = true
	}
}

// 전체 % 강제(나쁜 목표) 대신, P0 요구사항 도메인의 핵심 로직(서비스/컨트롤러)에만
// 완만한 하한을 둬서 "P0 코드 테스트 누락/회귀"를 감지한다. 리포지토리(DB 통합 비중 큼)와
// DTO 는 포함하지 않는다. requirements.yaml 의 P0: 카드 에셋·커뮤니티 채팅·카드 덱.
tasks.named('jacocoTestCoverageVerification') {
	dependsOn tasks.named('test')
	violationRules {
		rule {
			element = 'PACKAGE'
			includes = [
				'world.yeon.backend.card_decks.route.service',
				'world.yeon.backend.card_decks.route.controller',
				'world.yeon.backend.card_decks.assets.service',
				'world.yeon.backend.card_decks.assets.controller',
				'world.yeon.backend.card_decks.merge_guest.service',
				'world.yeon.backend.community_chat.service',
				'world.yeon.backend.community_chat.controller',
			]
			limit {
				counter = 'INSTRUCTION'
				value = 'COVEREDRATIO'
				minimum = 0.30
			}
		}
	}
}
