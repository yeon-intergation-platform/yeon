name: yeon

services:
  backend:
    image: ${YEON_BACKEND_IMAGE:?YEON_BACKEND_IMAGE must be an immutable deployment image reference}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_INTERNAL_TOKEN_FILE: /run/secrets/SPRING_INTERNAL_TOKEN
      AUTH_SECRET_FILE: /run/secrets/AUTH_SECRET
      TYPING_RACE_SEED_SECRET_FILE: /run/secrets/TYPING_RACE_SEED_SECRET
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-yeon}
      POSTGRES_USER: ${POSTGRES_USER:-yeon}
      POSTGRES_PASSWORD_FILE: /run/secrets/POSTGRES_PASSWORD
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET_FILE: /run/secrets/GOOGLE_CLIENT_SECRET
      KAKAO_REST_API_KEY_FILE: /run/secrets/KAKAO_REST_API_KEY
      KAKAO_CLIENT_SECRET_FILE: /run/secrets/KAKAO_CLIENT_SECRET
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET_FILE: /run/secrets/MICROSOFT_CLIENT_SECRET
      OPENAI_API_KEY_FILE: /run/secrets/OPENAI_API_KEY
      ZAI_API_KEY_FILE: /run/secrets/ZAI_API_KEY
      ZAI_BASE_URL: ${ZAI_BASE_URL:-}
      ZAI_GRADING_MODEL: ${ZAI_GRADING_MODEL:-}
      ZAI_DECK_GENERATION_MODEL: ${ZAI_DECK_GENERATION_MODEL:-}
      ZAI_MODEL: ${ZAI_MODEL:-}
      YEON_CARD_AI_ENABLED: ${YEON_CARD_AI_ENABLED:?YEON_CARD_AI_ENABLED must be configured}
      YEON_CARD_AI_GLOBAL_DAILY_REQUEST_LIMIT: ${YEON_CARD_AI_GLOBAL_DAILY_REQUEST_LIMIT:?YEON_CARD_AI_GLOBAL_DAILY_REQUEST_LIMIT must be configured}
      YEON_CARD_AI_GLOBAL_DAILY_TOKEN_LIMIT: ${YEON_CARD_AI_GLOBAL_DAILY_TOKEN_LIMIT:?YEON_CARD_AI_GLOBAL_DAILY_TOKEN_LIMIT must be configured}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID_FILE: /run/secrets/R2_ACCESS_KEY_ID
      R2_SECRET_ACCESS_KEY_FILE: /run/secrets/R2_SECRET_ACCESS_KEY
      YEON_REQUIRED_SECRETS: SPRING_INTERNAL_TOKEN,AUTH_SECRET,TYPING_RACE_SEED_SECRET,POSTGRES_PASSWORD
      YEON_OPTIONAL_SECRETS: GOOGLE_CLIENT_SECRET,KAKAO_REST_API_KEY,KAKAO_CLIENT_SECRET,MICROSOFT_CLIENT_SECRET,OPENAI_API_KEY,ZAI_API_KEY,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY
    secrets:
      - SPRING_INTERNAL_TOKEN
      - AUTH_SECRET
      - TYPING_RACE_SEED_SECRET
      - POSTGRES_PASSWORD
      - GOOGLE_CLIENT_SECRET
      - KAKAO_REST_API_KEY
      - KAKAO_CLIENT_SECRET
      - MICROSOFT_CLIENT_SECRET
      - OPENAI_API_KEY
      - ZAI_API_KEY
      - R2_ACCESS_KEY_ID
      - R2_SECRET_ACCESS_KEY
    networks:
      default:
      edge:
        aliases:
          - yeon-prod-backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8081/actuator/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    image: ${YEON_WEB_IMAGE:?YEON_WEB_IMAGE must be an immutable deployment image reference}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      AUTH_SECRET_FILE: /run/secrets/AUTH_SECRET
      SPRING_BOOTSTRAP_BASE_URL: http://backend:8081
      SPRING_BACKEND_BASE_URL: http://backend:8081
      SPRING_INTERNAL_TOKEN_FILE: /run/secrets/SPRING_INTERNAL_TOKEN
      TYPING_RACE_SEED_SECRET_FILE: /run/secrets/TYPING_RACE_SEED_SECRET
      YEON_ADMIN_EMAILS: ${YEON_ADMIN_EMAILS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      KAKAO_REST_API_KEY_FILE: /run/secrets/KAKAO_REST_API_KEY
      OPENAI_API_KEY_FILE: /run/secrets/OPENAI_API_KEY
      OPENAI_AI_CHAT_MODEL: ${OPENAI_AI_CHAT_MODEL:-}
      OPENAI_AI_IMPORT_MODEL: ${OPENAI_AI_IMPORT_MODEL:-}
      OPENAI_AI_VISION_MODEL: ${OPENAI_AI_VISION_MODEL:-}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-}
      OPENAI_TRANSCRIPTION_FALLBACK_MODELS: ${OPENAI_TRANSCRIPTION_FALLBACK_MODELS:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID_FILE: /run/secrets/R2_ACCESS_KEY_ID
      R2_SECRET_ACCESS_KEY_FILE: /run/secrets/R2_SECRET_ACCESS_KEY
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      ROOM_VOICE_CALL_ENABLED: ${ROOM_VOICE_CALL_ENABLED:-false}
      YEON_REQUIRED_SECRETS: AUTH_SECRET,SPRING_INTERNAL_TOKEN,TYPING_RACE_SEED_SECRET,KAKAO_REST_API_KEY
      YEON_OPTIONAL_SECRETS: OPENAI_API_KEY,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY
    secrets:
      - AUTH_SECRET
      - SPRING_INTERNAL_TOKEN
      - TYPING_RACE_SEED_SECRET
      - KAKAO_REST_API_KEY
      - OPENAI_API_KEY
      - R2_ACCESS_KEY_ID
      - R2_SECRET_ACCESS_KEY
    networks:
      default:
      edge:
        aliases:
          - yeon-prod-web
    depends_on:
      backend:
        condition: service_healthy

  race-server:
    image: ${YEON_RACE_SERVER_IMAGE:?YEON_RACE_SERVER_IMAGE must be an immutable deployment image reference}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 2567
      SPRING_BOOTSTRAP_BASE_URL: http://backend:8081
      SPRING_BACKEND_BASE_URL: http://backend:8081
      SPRING_INTERNAL_TOKEN_FILE: /run/secrets/SPRING_INTERNAL_TOKEN
      TYPING_RACE_SEED_SECRET_FILE: /run/secrets/TYPING_RACE_SEED_SECRET
      YEON_REQUIRED_SECRETS: SPRING_INTERNAL_TOKEN,TYPING_RACE_SEED_SECRET
    secrets:
      - SPRING_INTERNAL_TOKEN
      - TYPING_RACE_SEED_SECRET
    networks:
      default:
      edge:
        aliases:
          - yeon-prod-race
    depends_on:
      backend:
        condition: service_healthy

  db:
    image: postgres:16-bookworm@sha256:05bb94c3949035f4da16815d91b389443f3dbc5db95d65e2cb9b1abbf8565974
    restart: unless-stopped
    networks:
      default:
      db-edge:
        aliases:
          - yeon-prod-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yeon}
      POSTGRES_USER: ${POSTGRES_USER:-yeon}
      POSTGRES_PASSWORD_FILE: /run/secrets/POSTGRES_PASSWORD
    secrets:
      - POSTGRES_PASSWORD
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-yeon} -d ${POSTGRES_DB:-yeon}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token-file
      - /run/secrets/CLOUDFLARE_TUNNEL_TOKEN
    secrets:
      - CLOUDFLARE_TUNNEL_TOKEN
    networks:
      - edge
      - db-edge

secrets:
  AUTH_SECRET:
    environment: AUTH_SECRET
  CLOUDFLARE_TUNNEL_TOKEN:
    environment: CLOUDFLARE_TUNNEL_TOKEN
  GOOGLE_CLIENT_SECRET:
    environment: GOOGLE_CLIENT_SECRET
  KAKAO_REST_API_KEY:
    environment: KAKAO_REST_API_KEY
  KAKAO_CLIENT_SECRET:
    environment: KAKAO_CLIENT_SECRET
  MICROSOFT_CLIENT_SECRET:
    environment: MICROSOFT_CLIENT_SECRET
  OPENAI_API_KEY:
    environment: OPENAI_API_KEY
  POSTGRES_PASSWORD:
    environment: POSTGRES_PASSWORD
  R2_ACCESS_KEY_ID:
    environment: R2_ACCESS_KEY_ID
  R2_SECRET_ACCESS_KEY:
    environment: R2_SECRET_ACCESS_KEY
  SPRING_INTERNAL_TOKEN:
    environment: SPRING_INTERNAL_TOKEN
  TYPING_RACE_SEED_SECRET:
    environment: TYPING_RACE_SEED_SECRET
  ZAI_API_KEY:
    environment: ZAI_API_KEY

volumes:
  postgres-data:

networks:
  edge:
    name: yeon-edge
    external: true
  db-edge:
    name: yeon-db-edge
    external: true
