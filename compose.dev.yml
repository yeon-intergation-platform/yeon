name: yeon-develop

services:
  backend:
    image: ${YEON_BACKEND_IMAGE:-ghcr.io/hyeonjun0527/yeon-backend:develop}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: staging
      SPRING_INTERNAL_TOKEN: ${SPRING_INTERNAL_TOKEN}
      BACKEND_DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    networks:
      default:
      edge:
        aliases:
          - yeon-dev-backend
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8081/actuator/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  web:
    image: ${YEON_WEB_IMAGE:-ghcr.io/hyeonjun0527/yeon-web-app:develop}
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      SPRING_BOOTSTRAP_BASE_URL: http://backend:8081
      SPRING_BACKEND_BASE_URL: http://backend:8081
      SPRING_INTERNAL_TOKEN: ${SPRING_INTERNAL_TOKEN}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_AI_CHAT_MODEL: ${OPENAI_AI_CHAT_MODEL:-}
      OPENAI_AI_IMPORT_MODEL: ${OPENAI_AI_IMPORT_MODEL:-}
      OPENAI_AI_VISION_MODEL: ${OPENAI_AI_VISION_MODEL:-}
      OPENAI_TRANSCRIPTION_MODEL: ${OPENAI_TRANSCRIPTION_MODEL:-}
      OPENAI_TRANSCRIPTION_FALLBACK_MODELS: ${OPENAI_TRANSCRIPTION_FALLBACK_MODELS:-}
      GOOGLE_VISION_API_KEY: ${GOOGLE_VISION_API_KEY:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      COUNSELING_RECORDS_WORK_DIR: ${COUNSELING_RECORDS_WORK_DIR:-}
      COUNSELING_RECORDS_STORAGE_DIR: ${COUNSELING_RECORDS_STORAGE_DIR:-}
      GOOGLE_SERVICE_ACCOUNT_KEY: ${GOOGLE_SERVICE_ACCOUNT_KEY:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET}
      GOOGLE_SITE_VERIFICATION: ${GOOGLE_SITE_VERIFICATION:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      default:
      edge:
        aliases:
          - yeon-dev-web
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy

  race-server:
    image: ${YEON_RACE_SERVER_IMAGE:-ghcr.io/hyeonjun0527/yeon-race-server:develop}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 2567
    ports:
      - "${RACE_SERVER_PORT:-2567}:2567"
    networks:
      default:
      edge:
        aliases:
          - yeon-dev-race

  db:
    image: postgres:16-bookworm
    restart: unless-stopped
    networks:
      default:
      db-edge:
        aliases:
          - yeon-dev-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-yeon_develop}
      POSTGRES_USER: ${POSTGRES_USER:-yeon_develop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-yeon_develop} -d ${POSTGRES_DB:-yeon_develop}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres-data:

networks:
  edge:
    name: yeon-edge
    external: true
  db-edge:
    name: yeon-db-edge
    external: true
